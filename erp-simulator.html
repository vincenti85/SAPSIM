function stdOf(mats, code) {
  const m = mats.find(r => r.MaterialCode === code);
  return m ? parseFloat(m.StandardPrice) : 0;
}

function buildJournals(p, mats, lang) {
  // ── MM helpers ──
  const mm  = p.mm[0] || { matCode:'RM001', qty:100, poPrice:5.00, stdPrice:5.50, vendor:'V001' };
  const mm2 = p.mm.find(m => m.matCode === 'RM002') || { matCode:'RM002', qty:20, poPrice:3.20, stdPrice:3.20, vendor:'V001' };
  const mmQty        = mm.qty;
  const mmStd        = mm.stdPrice;
  const mmPO         = mm.poPrice;
  const mmInventory  = +(mmQty * mmStd).toFixed(2);
  const mmGRIR       = +(mmQty * mmPO).toFixed(2);
  const mmPPV        = +(mmQty * (mmStd - mmPO)).toFixed(2);
  const mmVendor     = mm.vendor || 'V001';
  // RM002 purchase helpers (for PP GI journal amounts)
  const mm2Std = mm2.stdPrice;

  // ── PP helpers ──
  const ppH = p.pp.find(o => o.outCode === 'SF001') || p.pp[0] ||
    { outCode:'SF001', outQty:20, components:[], laborHr:20, laborRate:14.675, machineHr:10, machineRate:14.00, ohRate:0 };
  const ppF = p.pp.find(o => o.outCode === 'FG001') || p.pp[1] ||
    { outCode:'FG001', outQty:10, components:[], laborHr:5, laborRate:25, machineHr:2.5, machineRate:35, ohRate:0 };

  const hCompLines = (ppH.components || []).map(c => {
    const std = stdOf(mats, c.code);
    return { code:c.code, qty:c.consumQty, std, amt:+(c.consumQty * std).toFixed(2) };
  });
  const hGI = hCompLines.reduce((s, c) => s + c.amt, 0);

  const hLabor   = +(ppH.laborHr   * ppH.laborRate  ).toFixed(2);
  const hMachine = +(ppH.machineHr * ppH.machineRate ).toFixed(2);
  const hOH      = +((hLabor + hMachine) * (ppH.ohRate / 100)).toFixed(2);
  const hActivity = +(hLabor + hMachine + hOH).toFixed(2);

  const hStd = stdOf(mats, 'SF001');
  const hGRamt = +(ppH.outQty * hStd).toFixed(2);
  const hActual = +(hGI + hActivity).toFixed(2);
  const hVariance = +(hActual - hGRamt).toFixed(2);

  const fCompLines = (ppF.components || []).map(c => {
    const std = stdOf(mats, c.code);
    return { code:c.code, qty:c.consumQty, std, amt:+(c.consumQty * std).toFixed(2) };
  });
  const fGI = fCompLines.reduce((s, c) => s + c.amt, 0);

  const fLabor   = +(ppF.laborHr   * ppF.laborRate  ).toFixed(2);
  const fMachine = +(ppF.machineHr * ppF.machineRate ).toFixed(2);
  const fOH      = +((fLabor + fMachine) * (ppF.ohRate / 100)).toFixed(2);
  const fActivity = +(fLabor + fMachine + fOH).toFixed(2);

  const fStd = stdOf(mats, 'FG001');
  const fGRamt = +(ppF.outQty * fStd).toFixed(2);
  const fActual   = +(fGI + fActivity).toFixed(2);
  const fVariance = +(fActual - fGRamt).toFixed(2);

  // ── SD helpers ──
  const sd = p.sd[0] || { matCode:'FG001', qty:5, salesPrice:150, customer:'C001' };
  const sdQty   = sd.qty;
  const sdPrice = sd.salesPrice;
  const sdCOGSu = stdOf(mats, sd.matCode) || fStd;
  const sdCOGS  = +(sdQty * sdCOGSu).toFixed(2);
  const sdRev   = +(sdQty * sdPrice).toFixed(2);
  const sdCust  = sd.customer || 'C001';

  return {

    kp26: {
      ko: { tcode:'KP26', title:'액티비티 단가 계획', lines:[
        { account:`CC001 노무비: $${ppH.laborRate.toFixed(2)}/h (계획)` },
        { account:`CC001 기계비: $${ppH.machineRate.toFixed(2)}/h (계획)` },
        { account:`CC002 노무비: $${ppF.laborRate.toFixed(2)}/h (계획)` },
        { account:`CC002 기계비: $${ppF.machineRate.toFixed(2)}/h (계획)` },

        { account:`기계비: CC001 ${ppH.machineHr}h × $${ppH.machineRate}/h = $${hMachine.toFixed(2)}` },
        { account:`합계(계산가): $${(+hGI + hActivity).toFixed(2)}` },

    { h:{ ko:'우리 회사 케이스 (2단계 멀티레벨)', en:'Our case (2-step, multi-level)' } }, { ul:{ ko:['Phase 1: 반제품 SF001 20EA — RM001 60KG+RM002 20KG 출고 + 노무20h·기계10h. 표준 $18/EA보다 실제 투입이 커 차이 발생.','Phase 2: 완제품 FG001 10EA — SF001 10EA+RM001 5KG + 노무5h·기계2.5h.','반드시 하위(반제품)부터 만들고 정산해야 상위 원가가 맞는다.'], en:['Phase 1: SF001 20EA — issue RM001 60KG + RM002 20KG + labor 20h/machine 10h. Actual input exceeds standard $18/EA, creating a variance.','Phase 2: FG001 10EA — issue SF001 10EA + RM001 5KG + labor 5h/machine 2.5h.','Always make and settle the lower level (semi-finished) first so the upper-level cost is correct.'] } },
    { h:{ ko:'팀장 통제점', en:'Team lead controls' } }, { ul:{ ko:['하위→상위 생산·정산 순서 준수','실적(수량·시간) 정확성 = 원가 정확성','생산차이 분석: 수율(자재) vs 설비/숙련(시간)','WIP(재공품) 관리'], en:['Follow the lower→upper production/settlement order','Accuracy of confirmations (qty/time) = accuracy of cost','Variance analysis: yield (material) vs equipment/skill (time)','Manage WIP (work in process)'] } },
    { h:{ ko:'주고받기', en:'Handoffs' } }, { ul:{ ko:['← 구매: 원자재 입고','← 원가 관리: 노무·기계 단가','→ 원가 관리: 생산차이 정산','→ 영업: 완제품 재고'], en:['← Buy: raw material receipt','← Cost: labor/machine rates','→ Cost: settle production variance','→ Sell: finished goods inventory'] } },
  ]},
  { id:'co', icon:'📊', title:{ ko:'원가 관리 (CO)', en:'Cost Management (CO)' }, blocks:[
    { h:{ ko:'미션', en:'Mission' } }, { p:{ ko:'외부 보고용 회계(FI)와 별개로, 이 제품이 진짜 얼마 들고 어디서 남는지를 내부 의사결정용으로 계산한다.', en:'Separately from external reporting (FI), calculate for internal decisions how much a product truly costs and where margin is made or lost.' } },
    { h:{ ko:'비즈니스 현실 (SAP 이전)', en:'Business reality (before SAP)' } }, { p:{ ko:'연초에 표준원가(가격표·견적 기준)를 정하고, 한 달 돌린 뒤 실제와의 차이를 월말 정산해 재고·매출원가를 실제에 맞게 보정하고 제품·고객별 진짜 마진을 본다.', en:'Set standard cost at year start (basis for price lists and quotes); after running a month, settle the difference vs actual at month-end to adjust inventory and COGS toward actual, and view true margin by product/customer.' } },
    { h:{ ko:'우리 회사 케이스', en:'Our case' } }, { ul:{ ko:['표준원가: 액티비티 단가 → 하위(SF001) → 상위(FG001) 계산/릴리즈','실제원가 결산: 구매가격차이+생산차이를 재고분/판매분으로 배부','수익성 분석: 표준 마진 vs 실제 마진 비교'], en:['Standard cost: activity rates → lower (SF001) → upper (FG001) calculate/release','Actual costing: allocate purchase + production variances to inventory vs sold portions','Profitability: compare standard margin vs actual margin'] } },
    { h:{ ko:'팀장 통제점', en:'Team lead controls' } }, { ul:{ ko:['표준원가 적정성(느슨/빡빡 균형)','차이 해석: 일시 변동인가 표준 오류 신호인가','결산 순서·마감(마감 후 재오픈 불가)','제품/고객 수익성으로 의사결정 지원'], en:['Adequacy of standard cost (loose vs tight balance)','Interpret variance: a temporary swing, or a sign the standard itself is wrong','Closing order and lock (period cannot be reopened after closing)','Support decisions with product/customer profitability'] } },
    { h:{ ko:'주고받기', en:'Handoffs' } }, { ul:{ ko:['← 구매 구매가격차이 / ← 생산 생산차이 / ← 영업 매출·수량','→ 회계·경영: 보정된 원가·수익성 리포트'], en:['← Buy purchase variance / ← Make production variance / ← Sell revenue & qty','→ Books & management: adjusted cost & profitability reports'] } },
  ]},
  { id:'sd', icon:'💰', title:{ ko:'팔기 (영업·SD)', en:'Sell (Sales·SD)' }, blocks:[
    { h:{ ko:'미션', en:'Mission' } }, { p:{ ko:'고객 주문을 받아 약속한 물건을 약속한 조건으로 출하·청구하고, 매출과 채권을 정확히 인식·회수한다.', en:'Take customer orders, deliver and bill the promised goods on the promised terms, and recognize and collect revenue and receivables accurately.' } },
    { h:{ ko:'비즈니스 현실 (SAP 이전)', en:'Business reality (before SAP)' } }, { p:{ ko:'주문 → 재고·납기 약속 → 출고·배송 → 송장 발행 → 수금. 출하 시점(매출원가 인식)과 청구 시점(매출·채권 인식)은 다르며, 혼동하면 손익이 왜곡된다.', en:'Order → confirm stock/lead time → pick & ship → issue invoice → collect. The goods-issue moment (recognize COGS) and the billing moment (recognize revenue/receivable) differ; confusing them distorts P&L.' } },
    { h:{ ko:'우리 회사 케이스', en:'Our case' } }, { p:{ ko:'C001 Northstar Motors에 FG001 5EA @ $150 = $750 판매. 출하 시 재고 감소+매출원가(표준 $225) 인식, 청구 시 매출·채권 $750 인식, 수금 후 채권 $0. 실제 매출원가는 CO 결산 후 보정.', en:'Sell FG001 5EA @ $150 = $750 to C001 Northstar Motors. At goods issue: inventory down + COGS (standard $225) recognized; at billing: revenue & receivable $750; after collection receivable $0. Actual COGS is adjusted after CO closing.' } },
    { h:{ ko:'팀장 통제점', en:'Team lead controls' } }, { ul:{ ko:['여신·납기 약속(재고 가용성·신용 한도)','가격·할인·운임 조건','출하 vs 청구 타이밍(매출 인식 시점)','채권 회수·연체·대손 관리'], en:['Credit & lead-time commitments (stock availability, credit limit)','Price, discount, and freight terms','Goods-issue vs billing timing (revenue recognition)','Receivables collection, overdue, and bad-debt management'] } },
    { h:{ ko:'주고받기', en:'Handoffs' } }, { ul:{ ko:['← 생산: 완제품 재고','→ 회계: 매출·채권·수금','→ 원가 관리: 매출·수량(수익성)'], en:['← Make: finished goods inventory','→ Books: revenue, receivable, collection','→ Cost: revenue & qty (profitability)'] } },

  { id:'fi', icon:'📒', title:{ ko:'회계 장부 (재무회계·FI)', en:'The Books (Financials·FI)' }, blocks:[

    { h:{ ko:'비즈니스 현실 (SAP 이전)', en:'Business reality (before SAP)' } }, { p:{ ko:'FI는 스스로 거래를 만들지 않는다. MM·PP·SD의 사건이 자동 분개되어 FI로 모인다. FI의 일은 그 기록의 정확성·완전성을 보증하고 채권·채무·현금을 마감하는 것이다.', en:'FI does not create transactions itself. Events from MM/PP/SD are auto-posted and converge into FI. Its role is to assure the accuracy and completeness of those records and to close receivables, payables, and cash.' } },
    { h:{ ko:'분개의 흐름 (차변=대변)', en:'Journal flow (debit = credit)' } }, { ul:{ ko:['입고: (차)원재료 / (대)GR-IR+구매가격차이','출하: (차)매출원가 / (대)완제품','청구: (차)매출채권 / (대)매출','수금: (차)현금 / (대)매출채권'], en:['Receipt: (Dr) Raw material / (Cr) GR-IR + purchase price variance','Goods issue: (Dr) COGS / (Cr) Finished goods','Billing: (Dr) Receivable / (Cr) Revenue','Collection: (Dr) Cash / (Cr) Receivable'] } },
    { h:{ ko:'팀장 통제점', en:'Team lead controls' } }, { ul:{ ko:['계정 결정의 정확성','마감(누락·미결 항목 점검)','보조원장과 총계정원장 정합성','전표 추적성(내부통제·감사)'], en:['Accuracy of account determination','Closing (check omissions / open items)','Subledger vs general ledger consistency','Document traceability (internal control / audit)'] } },
    { h:{ ko:'주고받기', en:'Handoffs' } }, { ul:{ ko:['← 모든 부서의 거래가 회계로 수렴','→ 경영·외부: 재무제표·세무·보고'], en:['← All areas converge into the books','→ Management & external: financial statements, tax, reporting'] } },

        ['영업','—','—','매출·수량','—','매출·채권'],
        ['회계','지급','—','결산데이터','여신','—'],
      ]},
      en:{ head:['Giver \\ Receiver','Buy','Make','Cost','Sell','Books'], rows:[
        ['Buy','—','Materials','Purchase variance','—','Payables'],
        ['Make','Material need','—','Production variance','Finished goods','Inventory/cost'],
        ['Cost','—','Activity rates','—','Profitability','Adjusted cost'],
        ['Sell','—','—','Revenue/qty','—','Revenue/receivable'],
        ['Books','Payment','—','Closing data','Credit','—'],

  { id:'checklist', icon:'✅', title:{ ko:'팀장 체크리스트', en:'Team Lead Checklist' }, blocks:[

    { ul:{ ko:['현실에서 무슨 사건인가? (물건/돈의 이동)','근거 서류는? (발주서/입고증/송장/주문서)','재고·원가·손익에 미치는 영향은?','전 단계(누구로부터)·다음 단계(누구에게)는?','차이(표준 vs 실제)가 생기면 그 의미는?','통제점은? (3-way matching·여신·마감·순서)'], en:['What real event is this? (movement of goods/cash)','What is the source document? (PO/GR/invoice/sales order)','What is the impact on inventory, cost, and P&L?','Previous step (from whom) and next step (to whom)?','If a variance (standard vs actual) arises, what does it mean?','What is the control point? (3-way matching, credit, closing, sequence)'] } },

];
const GuideBlock = ({ b, lang }) => {
  const pick = o => (o && (o[lang] !== undefined ? o[lang] : o.ko));
  if (b.h) return <h4 className="font-bold text-slate-800 mt-3 mb-1 text-sm">{pick(b.h)}</h4>;
  if (b.p) return <p className="text-xs text-slate-600 leading-relaxed mb-1.5">{pick(b.p)}</p>;
  if (b.ul) return <ul className="list-disc pl-5 space-y-0.5 mb-1.5">{pick(b.ul).map((x, i) => <li key={i} className="text-xs text-slate-600 leading-relaxed">{x}</li>)}</ul>;
  if (b.flow) { const items = pick(b.flow); return <div className="flex flex-wrap items-center gap-1.5 mb-2">{items.map((x, i) => <React.Fragment key={i}><span className="bg-emerald-100 text-emerald-800 text-xs font-semibold px-2.5 py-1 rounded-full">{x}</span>{i < items.length - 1 && <span className="text-slate-400">→</span>}</React.Fragment>)}</div>; }
  if (b.tbl) { const t = pick(b.tbl); return (
    <div className="overflow-x-auto mb-2">
      <table className="w-full text-xs border-collapse">
        <thead><tr className="bg-slate-100 text-slate-700 text-left">{t.head.map((h, i) => <th key={i} className="px-2 py-1 border border-slate-200 font-semibold whitespace-nowrap">{h}</th>)}</tr></thead>
        <tbody>{t.rows.map((r, i) => <tr key={i}>{r.map((c, j) => <td key={j} className="px-2 py-1 border border-slate-200 text-slate-600 align-top">{c}</td>)}</tr>)}</tbody>
      </table>
    </div>
  ); }
  return null;
};
const GuideModal = ({ lang, onClose }) => {

  return (
    <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[60] p-4" onClick={onClose}>
      <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[88vh] flex flex-col" onClick={e => e.stopPropagation()}>
        <div className="bg-gradient-to-r from-emerald-700 to-teal-700 text-white px-4 py-3 rounded-t-xl flex justify-between items-center shrink-0">
          <span className="font-bold text-sm">📘 {ko ? '주관 팀장 비즈니스 가이드' : 'Team Lead Business Guide'}</span>
          <button onClick={onClose} className="text-white/80 hover:text-white text-lg leading-none">✕</button>
        </div>
        <div className="px-4 py-2 text-[11px] text-slate-500 border-b border-slate-100 shrink-0">{ko ? 'SAP 처리 이전에 알아야 할 업무별 비즈니스 흐름 (내부 교육용)' : 'Business flow by work area to understand before SAP processing (internal training)'}</div>
        <div className="flex flex-1 min-h-0">
          <nav className="w-36 shrink-0 border-r border-slate-100 overflow-y-auto p-2 space-y-0.5 bg-slate-50">
            {GUIDE_SECTIONS.map(s => (
              <button key={s.id} onClick={() => setSec(s.id)} className={`w-full text-left text-xs px-2.5 py-1.5 rounded transition-colors ${sec === s.id ? 'bg-emerald-600 text-white font-semibold' : 'text-slate-600 hover:bg-slate-200'}`}>{s.icon} {tt(s)}</button>
            ))}
          </nav>
          <div className="flex-1 overflow-y-auto p-4">
            <h3 className="text-base font-extrabold text-slate-800 mb-2">{cur.icon} {tt(cur)}</h3>
            {cur.blocks.map((b, i) => <GuideBlock key={i} b={b} lang={lang} />)}
          </div>
        </div>
        <div className="px-4 py-2 text-[10px] text-slate-400 border-t border-slate-100 shrink-0">{ko ? 'ABC Auto Parts(가상) 시나리오 기준 · SAP는 SAP SE의 등록상표' : 'Based on ABC Auto Parts (fictitious) · SAP is a trademark of SAP SE'}</div>
      </div>
    </div>
  );
};
/* =========================================================================
   LEARNING TOOLS SWITCHER (Odoo-style app launcher — Mid-term UI item)
   Consolidates Intro Tour / T-code Map / Team Lead Guide into one grid
   dropdown instead of three separate header pills.
   ========================================================================= */
const LEARNING_TOOLS = [
  { id:'intro',   icon:'🎬', ko:'둘러보기',    en:'Intro Tour', color:'indigo' },
  { id:'mapping', icon:'📑', ko:'T-code 매핑', en:'T-code Map', color:'amber' },
  { id:'guide',   icon:'📘', ko:'팀장 가이드', en:'Lead Guide', color:'emerald' },
];
const LEARNING_TOOL_COLORS = {
  indigo:'border-indigo-300 bg-indigo-50 hover:border-indigo-400',
  amber:'border-amber-300 bg-amber-50 hover:border-amber-400',
  emerald:'border-emerald-300 bg-emerald-50 hover:border-emerald-400',
};
const LearningToolsSwitcher = ({ lang }) => {
  const [open, setOpen] = useState(false);
  const [modal, setModal] = useState(null); // 'intro' | 'mapping' | 'guide' | null
  const ref = useRef(null);
  useEffect(() => {
    const onDoc = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown', onDoc);
    return () => document.removeEventListener('mousedown', onDoc);
  }, []);
  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(o => !o)}
        className="flex items-center gap-1 px-3 py-1 rounded-full border border-white/30 bg-white/10 text-xs font-semibold text-white hover:bg-white/20 transition-colors">
        🧰 {lang === 'ko' ? '학습 도구' : 'Learning Tools'}
      </button>
      {open && (
        <div className="absolute right-0 mt-2 w-64 bg-white rounded-xl shadow-2xl border border-slate-200 p-3 grid grid-cols-3 gap-2 z-50">
          {LEARNING_TOOLS.map(tool => (
            <button key={tool.id} onClick={() => { setModal(tool.id); setOpen(false); }}
              className={`flex flex-col items-center gap-1 rounded-lg border-2 p-2 text-center transition-colors ${LEARNING_TOOL_COLORS[tool.color]}`}>
              <span className="text-2xl">{tool.icon}</span>
              <span className="text-[10px] font-semibold text-slate-700 leading-tight">{lang === 'ko' ? tool.ko : tool.en}</span>
            </button>
          ))}
        </div>
      )}
      {modal === 'intro' && <IntroTour lang={lang} onClose={() => setModal(null)} />}
      {modal === 'mapping' && <MappingModal lang={lang} onClose={() => setModal(null)} />}
      {modal === 'guide' && <GuideModal lang={lang} onClose={() => setModal(null)} />}
    </div>
  );
};

/* =========================================================================
   STEP BUTTON
   ========================================================================= */
const StepButton = ({ steps, setSteps, stepKey, label, color='blue', journalData, onExecute, onCancel, openPopup, disabled=false, lang='ko' }) => {
  const colors = {
    blue:'bg-blue-500 hover:bg-blue-600', orange:'bg-orange-500 hover:bg-orange-600',
    indigo:'bg-indigo-500 hover:bg-indigo-600', teal:'bg-teal-500 hover:bg-teal-600',
    green:'bg-green-500 hover:bg-green-600', purple:'bg-purple-500 hover:bg-purple-600',
    red:'bg-red-500 hover:bg-red-600'
  };
  const done = !!steps[stepKey];
  // Next actionable step = first not-yet-done key in the steps object's declared order.
  const firstUndoneKey = Object.keys(steps).find(k => !steps[k]);
  const isNext = !disabled && !done && stepKey === firstUndoneKey;
  const execute = () => {
    if (disabled) return;
    setSteps(prev => ({ ...prev, [stepKey]: true }));
    if (journalData) openPopup(journalData);
    onExecute?.();
  };
  const cancel = () => {
    const keys = Object.keys(steps);
    const idx = keys.indexOf(stepKey);
    setSteps(prev => {
      const next = { ...prev };
      keys.slice(idx).forEach(k => { next[k] = false; });
      return next;
    });
    onCancel?.();
  };
  return (
    <div className="flex gap-0.5 mb-1 items-center">
      <button onClick={execute} disabled={done || disabled}
        className={`flex items-center gap-1 px-3 py-1.5 rounded text-xs font-medium transition-all
          ${done ? 'bg-green-100 text-green-700 border border-green-300'
                 : disabled ? 'bg-slate-200 text-slate-400 cursor-not-allowed'
                 : `${colors[color]} text-white shadow-sm`}
          ${isNext ? 'ring-2 ring-offset-1 ring-yellow-400 animate-pulse' : ''}`}>
        {done ? '✓' : isNext ? '👉' : '▶'} {label}
        {isNext && <span className="ml-1 px-1 py-0.5 rounded bg-yellow-300 text-yellow-900 text-[10px] font-bold leading-none">
          {lang==='ko' ? '다음' : 'NEXT'}
        </span>}
      </button>
      {done && (
        <>
          {journalData && <button onClick={() => openPopup(journalData)}
            className="px-2 py-1 rounded text-xs bg-blue-100 text-blue-600 hover:bg-blue-200">{T[lang].journalBtn}</button>}
          <button onClick={cancel} className="px-2 py-1 rounded text-xs bg-red-100 text-red-600 hover:bg-red-200">↺</button>
        </>
      )}
    </div>
  );
};

/* =========================================================================
   SCENARIO PROGRESS (global stepper — Quick Win #1 & #2)
   Shows completion across the main journey (Master -> Purchasing -> Production
   -> Costing -> Sales). State is conveyed by icon + text, not color alone,
   so it stays legible for colorblind users.

const stepsRatio = (steps) => {
  const vals = Object.values(steps);
  return { done: vals.filter(Boolean).length, total: vals.length };
};
const SCENARIO_MODULES = [
  { key:'master', tab:'master', icon:'🗂️', ko:'마스터', en:'Master' },
  { key:'mm',     tab:'mm',     icon:'🛒', ko:'구매',   en:'Purchasing' },
  { key:'pp',     tab:'pp',     icon:'⚙️', ko:'생산',   en:'Production' },
  { key:'fico',   tab:'fico',   icon:'📊', ko:'원가결산', en:'Costing' },
  { key:'sd',     tab:'sd',     icon:'💰', ko:'매출',   en:'Sales' },
];
const ScenarioProgress = ({ ckSteps, mmSteps, ppSteps, ficoSteps, sdSteps, activeTab, setActiveTab, lang }) => {
  const ratios = {
    master: stepsRatio(ckSteps), mm: stepsRatio(mmSteps), pp: stepsRatio(ppSteps),
    fico: stepsRatio(ficoSteps), sd: stepsRatio(sdSteps),
  };
  return (
    <div className="flex items-center gap-1 flex-wrap py-1.5 border-b border-white/10">
      <span className="text-[11px] text-slate-400 mr-0.5">{lang==='ko' ? '진행' : 'Progress'}</span>
      {SCENARIO_MODULES.map((m, i) => {
        const r = ratios[m.key];
        const state = r.total === 0 ? 'pending' : r.done === r.total ? 'complete' : r.done > 0 ? 'partial' : 'pending';
        const isCurrent = activeTab === m.tab;
        return (
          <React.Fragment key={m.key}>
            <button onClick={() => setActiveTab(m.tab)}
              className={`flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-semibold border transition-all
                ${state==='complete' ? 'bg-green-500/20 border-green-400 text-green-200'
                  : state==='partial' ? 'bg-amber-500/20 border-amber-400 text-amber-200'
                  : 'bg-white/5 border-white/15 text-slate-400'}
                ${isCurrent ? 'ring-2 ring-white/60' : ''}`}>
              <span>{state==='complete' ? '✅' : state==='partial' ? '🔶' : m.icon}</span>
              <span>{lang==='ko' ? m.ko : m.en}</span>
              <span className="opacity-70">{r.done}/{r.total}</span>
            </button>
            {i < SCENARIO_MODULES.length - 1 && <span className="text-slate-600 text-xs">→</span>}

const BOMTree = ({ materials, lang='ko' }) => {

    return (
      <div>
        <div className="flex items-center gap-2 py-1" style={{ paddingLeft: depth*20 }}>

  return <div>{roots.map((r,i) => <BOMNode key={i} mat={r} />)}</div>;
};

/* =========================================================================
   CSV PARSER
   ========================================================================= */
function parseCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n').filter(l => l.trim() !== '');
  if (lines.length < 2) throw new Error('CSV 데이터가 비어 있습니다');
  const header = lines[0].split(',').map(h => h.trim());
  const missing = REQUIRED_CSV_COLS.filter(c => !header.includes(c));
  if (missing.length > 0) throw new Error('필수 컬럼 누락: ' + missing.join(', '));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split(',').map(c => c.trim());
    const obj = {};
    header.forEach((h, idx) => { obj[h] = cells[idx] !== undefined ? cells[idx] : ''; });
    if (!obj.MaterialCode) continue;
    rows.push(obj);
  }
  if (rows.length === 0) throw new Error('유효한 자재 행이 없습니다');
  return rows;
}

const PARAM_COLS = {
  mm: ['MatCode','Qty','POPrice','StdPrice','Vendor'],
  pp: ['OutCode','OutQty','ScrapPct','Components','LaborHr','LaborRate','MachineHr','MachineRate','OHRate'],
  sd: ['MatCode','Qty','SalesPrice','Customer'],
};

function parseParamCSV(text, kind) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) throw new Error(`${kind.toUpperCase()} CSV is empty`);
  const header = lines[0].split(',').map(h => h.trim());
  const missing = PARAM_COLS[kind].filter(c => !header.includes(c));
  if (missing.length) throw new Error(`Missing columns: ${missing.join(', ')}`);

  return lines.slice(1).map((line, i) => {
    const vals = line.split(',').map(v => v.trim());
    const row = {};
    header.forEach((h, idx) => { row[h] = vals[idx] || ''; });

    if (kind === 'mm') {
      const qty     = parseFloat(row.Qty);
      const poPrice = parseFloat(row.POPrice);
      const stdPrice = parseFloat(row.StdPrice);
      if (isNaN(qty) || isNaN(poPrice) || isNaN(stdPrice))
        throw new Error(`Row ${i+2}: Qty, POPrice, StdPrice must be numbers`);
      return { matCode:row.MatCode, qty, poPrice, stdPrice, vendor:row.Vendor || 'V001' };
    }

    if (kind === 'pp') {
      const outQty   = parseFloat(row.OutQty);
      const scrapPct = parseFloat(row.ScrapPct);
      const laborHr  = parseFloat(row.LaborHr);
      const laborRate = parseFloat(row.LaborRate);
      const machineHr = parseFloat(row.MachineHr);
      const machineRate = parseFloat(row.MachineRate);
      const ohRate   = parseFloat(row.OHRate);
      if ([outQty, scrapPct, laborHr, laborRate, machineHr, machineRate, ohRate].some(isNaN))
        throw new Error(`Row ${i+2}: numeric columns must be numbers`);
      const components = (row.Components || '').split(';').filter(Boolean).map(pair => {
        const [code, qty] = pair.split(':');
        return { code: (code||'').trim(), consumQty: parseFloat(qty) || 0 };
      });
      return { outCode:row.OutCode, outQty, scrapPct, components, laborHr, laborRate, machineHr, machineRate, ohRate };
    }

    if (kind === 'sd') {
      const qty = parseFloat(row.Qty);
      const salesPrice = parseFloat(row.SalesPrice);
      if (isNaN(qty) || isNaN(salesPrice))
        throw new Error(`Row ${i+2}: Qty, SalesPrice must be numbers`);
      return { matCode:row.MatCode, qty, salesPrice, customer:row.Customer || 'C001' };
    }

    throw new Error(`Unknown kind: ${kind}`);
  });
}

function ParametersTab({ simParams, setSimParams, materials, lang }) {
  const isKo = lang === 'ko';

  const [mmErr, setMmErr] = React.useState('');
  const [ppErr, setPpErr] = React.useState('');
  const [sdErr, setSdErr] = React.useState('');

  function handleUpload(kind, ev) {
    const file = ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const rows = parseParamCSV(String(e.target.result), kind);
        setSimParams(prev => ({ ...prev, [kind]: rows }));
        if (kind === 'mm') setMmErr('');
        if (kind === 'pp') setPpErr('');
        if (kind === 'sd') setSdErr('');
      } catch (err) {
        if (kind === 'mm') setMmErr(err.message);
        if (kind === 'pp') setPpErr(err.message);
        if (kind === 'sd') setSdErr(err.message);
      }
      ev.target.value = '';
    };
    reader.readAsText(file);
  }

  function resetModule(kind) {
    setSimParams(prev => ({ ...prev, [kind]: DEFAULT_PARAMS[kind] }));
    if (kind === 'mm') setMmErr('');
    if (kind === 'pp') setPpErr('');
    if (kind === 'sd') setSdErr('');
  }

  const SAMPLE_CSV = {
    mm: 'MatCode,Qty,POPrice,StdPrice,Vendor\nRM001,100,5.00,5.50,V001\nRM002,20,3.20,3.20,V001',
    pp: 'OutCode,OutQty,ScrapPct,Components,LaborHr,LaborRate,MachineHr,MachineRate,OHRate\nSF001,20,0,RM001:60;RM002:20,20,14.675,10,14.00,0\nFG001,10,0,SF001:10;RM001:5,5,25,2.5,35,0',
    sd: 'MatCode,Qty,SalesPrice,Customer\nFG001,5,150,C001',
  };

  function downloadSampleCSV(kind) {
    const blob = new Blob([SAMPLE_CSV[kind]], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `sample-${kind}-params.csv`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function setMmField(idx, key, val) {
    setSimParams(prev => {
      const next = prev.mm.map((r, i) => i === idx ? { ...r, [key]: key === 'matCode' || key === 'vendor' ? val : parseFloat(val) || 0 } : r);
      return { ...prev, mm: next };
    });
  }
  function setPpField(idx, key, val) {
    setSimParams(prev => {
      const next = prev.pp.map((r, i) => i === idx ? { ...r, [key]: key === 'outCode' ? val : parseFloat(val) || 0 } : r);
      return { ...prev, pp: next };
    });
  }
  function setSdField(idx, key, val) {
    setSimParams(prev => {
      const next = prev.sd.map((r, i) => i === idx ? { ...r, [key]: key === 'matCode' || key === 'customer' ? val : parseFloat(val) || 0 } : r);
      return { ...prev, sd: next };
    });
  }

  const tdCls = 'border border-gray-200 px-2 py-1 text-sm';
  const inCls = 'w-full border-0 bg-transparent focus:ring-1 focus:ring-blue-400 rounded px-1 text-sm';
  const lbl = (ko, en) => isKo ? ko : en;

  const mm0 = simParams.mm[0] || {};
  const mmPPV = mm0.qty && mm0.stdPrice && mm0.poPrice
    ? +(mm0.qty * (mm0.stdPrice - mm0.poPrice)).toFixed(2) : 0;

  return (
    <div className="space-y-6 p-4">
      {/* MM Card */}
      <div className="bg-white rounded-lg shadow p-4 border border-gray-100">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-slate-700">{String.fromCodePoint(0x1F6D2)} {lbl('구매 변수 (MM)','Purchase Variables (MM)')}</h3>

              {lbl('샘플 CSV','Sample CSV')}
            </button>
            <label className="cursor-pointer bg-blue-600 text-white text-xs px-3 py-1 rounded hover:bg-blue-700">
              {lbl('CSV 업로드','Upload CSV')}
              <input type="file" accept=".csv,text/csv" onChange={e => handleUpload('mm', e)} className="hidden" />
            </label>
            <button onClick={() => resetModule('mm')} className="bg-gray-200 text-gray-700 text-xs px-3 py-1 rounded hover:bg-gray-300">
              {lbl('기본값','Reset')}

              ))}
            </tr>
          </thead>
          <tbody>
            {simParams.mm.map((row, i) => (
              <tr key={i} className="hover:bg-gray-50">
                <td className={tdCls}><input className={inCls} value={row.matCode} onChange={e => setMmField(i,'matCode',e.target.value)} /></td>
                <td className={tdCls}><input className={inCls} type="number" step="1" value={row.qty} onChange={e => setMmField(i,'qty',e.target.value)} /></td>
                <td className={tdCls}><input className={inCls} type="number" step="0.01" value={row.poPrice} onChange={e => setMmField(i,'poPrice',e.target.value)} /></td>
                <td className={tdCls}><input className={inCls} type="number" step="0.01" value={row.stdPrice} onChange={e => setMmField(i,'stdPrice',e.target.value)} /></td>
                <td className={tdCls}><input className={inCls} value={row.vendor} onChange={e => setMmField(i,'vendor',e.target.value)} /></td>
              </tr>
            ))}
          </tbody>
        </table>
        <p className="text-xs text-gray-500">
          {lbl('미리보기','Preview')}: {lbl('재고 평가액','Inventory')} = ${mm0.qty && mm0.stdPrice ? +(mm0.qty * mm0.stdPrice).toFixed(2) : '—'} &nbsp;|&nbsp;
          PPV = {mmPPV >= 0 ? '+' : ''}{mmPPV} {mmPPV >= 0 ? lbl('유리','Fav') : lbl('불리','Unfav')}
        </p>
        <p className="text-xs text-gray-400 mt-1">
          {lbl('CSV 컬럼:','Required CSV columns:')} MatCode, Qty, POPrice, StdPrice, Vendor
        </p>
      </div>

      {/* PP Card */}
      <div className="bg-white rounded-lg shadow p-4 border border-gray-100">
        <div className="flex items-center justify-between mb-3">

              {lbl('샘플 CSV','Sample CSV')}
            </button>
            <label className="cursor-pointer bg-blue-600 text-white text-xs px-3 py-1 rounded hover:bg-blue-700">
              {lbl('CSV 업로드','Upload CSV')}
              <input type="file" accept=".csv,text/csv" onChange={e => handleUpload('pp', e)} className="hidden" />

            <button onClick={() => resetModule('pp')} className="bg-gray-200 text-gray-700 text-xs px-3 py-1 rounded hover:bg-gray-300">
              {lbl('기본값','Reset')}
            </button>
          </div>
        </div>
        {ppErr && <p className="text-red-500 text-xs mb-2">{ppErr}</p>}
        <div className="overflow-x-auto">
          <table className="w-full border-collapse text-sm mb-2">
            <thead className="bg-gray-50">
              <tr>
                {['OutCode','OutQty','ScrapPct','Components (Code:Qty;…)','LaborHr','LaborRate','MachHr','MachRate','OHRate%'].map(h => (
                  <th key={h} className={tdCls + ' font-medium text-gray-600 text-left whitespace-nowrap'}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {simParams.pp.map((row, i) => {
                const compStr = (row.components||[]).map(c => `${c.code}:${c.consumQty}`).join(';');
                return (
                  <tr key={i} className="hover:bg-gray-50 align-top">
                    <td className={tdCls}><input className={inCls} value={row.outCode} onChange={e=>setPpField(i,'outCode',e.target.value)} /></td>
                    <td className={tdCls}><input className={inCls} type="number" value={row.outQty} onChange={e=>setPpField(i,'outQty',e.target.value)} /></td>
                    <td className={tdCls}><input className={inCls} type="number" step="0.01" value={row.scrapPct} onChange={e=>setPpField(i,'scrapPct',e.target.value)} /></td>
                    <td className={tdCls}>
                      <input className={inCls + ' min-w-[160px]'} value={compStr}
                        onChange={e => {
                          const comps = e.target.value.split(';').filter(Boolean).map(p=>{
                            const [code,qty]=p.split(':'); return {code:(code||'').trim(), consumQty:parseFloat(qty)||0};
                          });
                          setSimParams(prev => ({ ...prev, pp: prev.pp.map((r,ri)=>ri===i?{...r,components:comps}:r) }));
                        }} />
                    </td>
                    <td className={tdCls}><input className={inCls} type="number" step="0.5" value={row.laborHr} onChange={e=>setPpField(i,'laborHr',e.target.value)} /></td>
                    <td className={tdCls}><input className={inCls} type="number" step="0.01" value={row.laborRate} onChange={e=>setPpField(i,'laborRate',e.target.value)} /></td>
                    <td className={tdCls}><input className={inCls} type="number" step="0.5" value={row.machineHr} onChange={e=>setPpField(i,'machineHr',e.target.value)} /></td>
                    <td className={tdCls}><input className={inCls} type="number" step="0.01" value={row.machineRate} onChange={e=>setPpField(i,'machineRate',e.target.value)} /></td>
                    <td className={tdCls}><input className={inCls} type="number" step="1" value={row.ohRate} onChange={e=>setPpField(i,'ohRate',e.target.value)} /></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {simParams.pp.map((row, i) => {
          const labAmt  = +(row.laborHr  * row.laborRate  ).toFixed(2);
          const machAmt = +(row.machineHr * row.machineRate).toFixed(2);
          const totAct  = +(labAmt + machAmt + (labAmt+machAmt)*(row.ohRate/100)).toFixed(2);
          const stdOut  = parseFloat((materials.find(m=>m.MaterialCode===row.outCode)||{StandardPrice:'0'}).StandardPrice);
          const grAmt   = +(row.outQty * stdOut).toFixed(2);
          const compAmt = +((row.components||[]).reduce((s,c)=>{
            const std=parseFloat((materials.find(m=>m.MaterialCode===c.code)||{StandardPrice:'0'}).StandardPrice);
            return s+c.consumQty*std;
          },0)).toFixed(2);
          const variance= +(compAmt + totAct - grAmt).toFixed(2);
          return (
            <p key={i} className="text-xs text-gray-500">
              {row.outCode}: {lbl('자재비','Mat')} ${compAmt} + {lbl('가공비','Act')} ${totAct} = {lbl('실제','Actual')} ${+(compAmt+totAct).toFixed(2)} / {lbl('표준 GR','Std GR')} ${grAmt} &rarr; {lbl('차이','Var')} {variance > 0 ? '+' : ''}{variance} ({variance > 0 ? lbl('불리','Unfav') : lbl('유리','Fav')})
            </p>
          );
        })}
        <p className="text-xs text-gray-400 mt-1">
          {lbl('CSV 컬럼:','Required CSV columns:')} OutCode, OutQty, ScrapPct, Components (RM001:60;RM002:20), LaborHr, LaborRate, MachineHr, MachineRate, OHRate
        </p>
      </div>

      {/* SD Card */}
      <div className="bg-white rounded-lg shadow p-4 border border-gray-100">
        <div className="flex items-center justify-between mb-3">
          <h3 className="font-semibold text-slate-700">{String.fromCodePoint(0x1F4B5)} {lbl('영업 변수 (SD)','Sales Variables (SD)')}</h3>
          <div className="flex gap-2">
            <button onClick={() => downloadSampleCSV('sd')} className="bg-emerald-600 text-white text-xs px-3 py-1 rounded hover:bg-emerald-700">
              {lbl('샘플 CSV','Sample CSV')}
            </button>
            <label className="cursor-pointer bg-blue-600 text-white text-xs px-3 py-1 rounded hover:bg-blue-700">
              {lbl('CSV 업로드','Upload CSV')}
              <input type="file" accept=".csv,text/csv" onChange={e => handleUpload('sd', e)} className="hidden" />
            </label>
            <button onClick={() => resetModule('sd')} className="bg-gray-200 text-gray-700 text-xs px-3 py-1 rounded hover:bg-gray-300">
              {lbl('기본값','Reset')}
            </button>
          </div>
        </div>
        {sdErr && <p className="text-red-500 text-xs mb-2">{sdErr}</p>}
        <table className="w-full border-collapse text-sm mb-2">
          <thead className="bg-gray-50">
            <tr>
              {['MatCode','Qty','Sales Price','Customer'].map(h => (
                <th key={h} className={tdCls + ' font-medium text-gray-600 text-left'}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {simParams.sd.map((row, i) => (
              <tr key={i} className="hover:bg-gray-50">
                <td className={tdCls}><input className={inCls} value={row.matCode} onChange={e=>setSdField(i,'matCode',e.target.value)} /></td>
                <td className={tdCls}><input className={inCls} type="number" step="1" value={row.qty} onChange={e=>setSdField(i,'qty',e.target.value)} /></td>
                <td className={tdCls}><input className={inCls} type="number" step="0.01" value={row.salesPrice} onChange={e=>setSdField(i,'salesPrice',e.target.value)} /></td>
                <td className={tdCls}><input className={inCls} value={row.customer} onChange={e=>setSdField(i,'customer',e.target.value)} /></td>
              </tr>
            ))}
          </tbody>
        </table>
        {simParams.sd.map((row, i) => {
          const cogs = parseFloat((materials.find(m=>m.MaterialCode===row.matCode)||{StandardPrice:'45.00'}).StandardPrice);
          const rev   = +(row.qty * row.salesPrice).toFixed(2);
          const cost  = +(row.qty * cogs).toFixed(2);
          const gp    = +(rev - cost).toFixed(2);
          const gpm   = rev ? +((gp/rev)*100).toFixed(1) : 0;
          return (
            <p key={i} className="text-xs text-gray-500">
              {row.matCode}: {lbl('매출','Rev')} ${rev} / {lbl('원가','COGS')} ${cost} / {lbl('총이익','GP')} ${gp} ({gpm}%)
            </p>
          );
        })}
        <p className="text-xs text-gray-400 mt-1">
          {lbl('CSV 컬럼:','Required CSV columns:')} MatCode, Qty, SalesPrice, Customer
        </p>
      </div>
    </div>
  );
}

const DryrunTab = ({ lang }) => {
  const modColor = {
    Master:'bg-gray-100 text-gray-700',
    MM:'bg-blue-100 text-blue-700',
    PP:'bg-orange-100 text-orange-700',
    CO:'bg-indigo-100 text-indigo-700',
    SD:'bg-teal-100 text-teal-700',
  };

  const rows = DRYRUN_DATA;

  const fmtAmt = (v) => v != null ? `$${Number(v).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}` : '';

  const JournalCell = ({ items, col }) => {
    if (!items || items.length === 0) return <td className={`px-2 py-2 text-xs text-slate-300 italic ${col==='dr'?'text-red-300':'text-blue-300'}`}>{T[lang].noJournal}</td>;
    return (
      <td className={`px-2 py-2 text-xs ${col==='dr'?'text-red-700':'text-blue-700'}`}>
        {items.map((item,i) => (
          <div key={i} className="flex justify-between gap-2 whitespace-nowrap">
            <span>{item.a[lang]}</span>
            {item.v != null && <span className="font-semibold ml-2">{fmtAmt(item.v)}</span>}
          </div>
        ))}
      </td>
    );
  };

  let prevModule = '';

  return (
    <div className="space-y-3">
      <div>
        <h2 className="text-base font-bold text-slate-800">{T[lang].dryrunTitle}</h2>
        <p className="text-xs text-slate-500 mt-0.5">{T[lang].dryrunSub}</p>
      </div>

      <div className="bg-white rounded-xl border border-slate-200 overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-xs">
            <thead>
              <tr className="bg-slate-800 text-white text-left">
                <th className="px-2 py-2 w-8 text-center">{T[lang].colNo}</th>
                <th className="px-2 py-2 w-16">{T[lang].colModule}</th>
                <th className="px-2 py-2 w-20">Fn</th>
                <th className="px-2 py-2 w-40">{T[lang].colTx}</th>
                <th className="px-2 py-2 w-44">{T[lang].colDr}</th>
                <th className="px-2 py-2 w-44">{T[lang].colCr}</th>
                <th className="px-2 py-2">{T[lang].colDescMemo}</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((row, idx) => {
                const isNewModule = row.module !== prevModule;
                prevModule = row.module;
                const bg = idx % 2 === 0 ? 'bg-white' : 'bg-slate-50';
                const noJournal = !row.dr && !row.cr;
                return (
                  <React.Fragment key={row.no}>
                    {isNewModule && (
                      <tr className="bg-slate-100">
                        <td colSpan={7} className="px-3 py-1">
                          <span className={`text-xs font-bold px-2 py-0.5 rounded ${modColor[row.module]||'bg-gray-100'}`}>
                            {row.module}
                          </span>
                        </td>
                      </tr>
                    )}
                    <tr className={`${bg} border-b border-slate-100 hover:bg-yellow-50 transition-colors`}>
                      <td className="px-2 py-2 text-center text-slate-400 font-mono">{row.no}</td>
                      <td className="px-2 py-2">
                        <span className={`text-xs px-1.5 py-0.5 rounded font-semibold ${modColor[row.module]||'bg-gray-100'}`}>{row.module}</span>
                      </td>
                      <td className="px-2 py-2 font-mono text-slate-600 font-medium">{'F'+String(row.no).padStart(2,'0')}</td>
                      <td className="px-2 py-2 font-medium text-slate-800">{row.tx[lang]}</td>
                      {noJournal
                        ? <td colSpan={2} className="px-2 py-2 text-center text-xs text-slate-300 italic">{T[lang].noJournal}</td>
                        : <>
                            <JournalCell items={row.dr} col="dr" />
                            <JournalCell items={row.cr} col="cr" />
                          </>
                      }
                      <td className="px-2 py-2 text-slate-500 leading-relaxed">{row.desc[lang]}</td>
                    </tr>
                  </React.Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {/* 요약 */}
      <div className="grid grid-cols-3 gap-3 text-xs">
        {[
          { label: lang==='ko'?'총 거래 수':'Total Transactions', val: rows.length, color:'text-slate-700' },
          { label: lang==='ko'?'분개 발생':'With Journal Entry', val: rows.filter(r=>r.dr||r.cr).length, color:'text-blue-700' },
          { label: lang==='ko'?'분개 없음':'No Journal Entry', val: rows.filter(r=>!r.dr&&!r.cr).length, color:'text-slate-400' },
        ].map((s,i) => (
          <div key={i} className="bg-white rounded-lg border border-slate-200 p-3 text-center">
            <div className={`text-2xl font-bold ${s.color}`}>{s.val}</div>
            <div className="text-slate-500 mt-0.5">{s.label}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

                      {row.isPct ? `${row.std.toFixed(1)}%` : `$${Math.abs(row.std).toFixed(2)}`}
                    </td>
                    <td className={`px-3 py-2 text-right ${row.bold?'font-bold':'font-medium'}`}>
                      {row.isPct

                        : <span className={row.bold?(actMargin>=0?'text-indigo-700':'text-red-600'):''}>${Math.abs(row.act).toFixed(2)}</span>}

                        : variance === 0 ? '—' : `${variance > 0 ? '+' : ''}$${variance.toFixed(2)}`}
                    </td>
                    <td className="px-3 py-2 text-right text-slate-400">
                      {pctOfRev !== null ? `${pctOfRev.toFixed(1)}%` : ''}

                  </tr>
                );

        </div>
        <div className="mt-3 pt-3 border-t border-slate-100 text-xs text-slate-400 space-y-1">

          <p>▪ {lang==='ko'

            : 'US Auto Parts OEM supply avg CM%: 55–65% (Note: this simulator actual margin 56.4% is at industry lower end)'}</p>
        </div>

    </div>
  );
};

        <h2 className="text-lg font-extrabold text-slate-800">{ko?'결산 로드맵 — 어디서부터 시작할까요?':'Close roadmap — where to begin?'}</h2>
        <p className="text-xs text-slate-500 mt-0.5">{ko?'분개장은 거래를 실행해야 채워집니다. 분개장이 아니라 ① 표준원가 설정부터 ⑤ CO-PA 수익성까지 순서대로 진행하세요.':'The ledger fills only after transactions run. Start not at the ledger, but at ① standard cost through to ⑤ CO-PA profitability.'}</p>
      </div>
      <ol className="space-y-0">
        {ACCT_STEPS.map((s, i) => (
          <li key={s.n} className="flex items-stretch gap-3">
            <div className="flex flex-col items-center">
              <div className="w-8 h-8 rounded-full bg-teal-600 text-white font-bold text-sm flex items-center justify-center shrink-0">{s.n}</div>

            <div className="flex-1 rounded-xl border border-teal-200 bg-teal-50/50 p-3 mb-2">
              <div className="flex items-center justify-between gap-2 flex-wrap">
                <div className="flex items-center gap-2">
                  <span className="text-xl">{s.icon}</span>
                  <span className="font-bold text-slate-800 text-sm">{ko?s.title.ko:s.title.en}</span>
                  <span className="text-[10px] text-slate-400">{s.sap}</span>
                </div>
                <button onClick={() => setActiveTab(s.tab)} className="text-xs font-semibold text-teal-700 bg-white border border-teal-300 rounded-lg px-2.5 py-1 hover:bg-teal-100 transition-colors">{ko?'이동 →':'Go →'}</button>
              </div>
              <p className="text-xs text-slate-600 mt-1 leading-relaxed">{ko?s.desc.ko:s.desc.en}</p>
            </div>
          </li>
        ))}
      </ol>
      <div className="mt-2 text-xs text-teal-800 bg-teal-50 border border-teal-200 rounded-lg px-3 py-2">
        💡 {ko?'①~②를 실행하면 분개장(전표)이 채워지고, ③~④에서 실제원가로 보정되며, ⑤에서 진짜 수익성이 보입니다.':'Steps ①–② fill the ledger, ③–④ adjust to actual cost, and ⑤ reveals true profitability.'}
      </div>
    </div>
  );
};
const RoleGuide = ({ tab, lang='ko' }) => {
  const g = ROLE_GUIDE[tab];
  if (!g) return null;
  const ko = lang === 'ko';
  return (
    <div className="mb-4 rounded-lg border border-indigo-200 bg-indigo-50 px-3 py-2 flex flex-wrap items-center gap-x-3 gap-y-1 text-xs">
      <span className="font-semibold text-indigo-700">{g.icon} {ko?g.role.ko:g.role.en} {ko?'업무':'tasks'}</span>

    </div>
  );
};

/* =========================================================================
   APP (GLOBAL STATE + DATA LINKAGE)
   ========================================================================= */
function App() {
  const [activeTab, setActiveTab] = useState('home_field');
  const [lang, setLang] = useState('ko'); // 'ko' | 'en'
  const [viewMode, setViewMode] = useState('field'); // 'field' (현업 역할별) | 'accounting' (회계 모듈별)
  const [materials, setMaterials] = useState(DEFAULT_MATERIALS);
  const [simParams, setSimParams] = useState(DEFAULT_PARAMS);
  const [showPopup, setShowPopup] = useState(false);
  const [popupData, setPopupData] = useState(null);

  const openPopup = (data) => { setPopupData(data); setShowPopup(true); };

  /* ---- PIN Gate ---- */
  const [unlocked, setUnlocked] = useState(false);
  const [pinDigits, setPinDigits] = useState(['','','','']);
  const [pinError, setPinError] = useState(false);
  const pinContainerRef = useRef(null);

  const focusPin = (i) => {
    const inputs = pinContainerRef.current?.querySelectorAll('input');
    inputs?.[i]?.focus();
  };
  const handlePinInput = (i, val) => {
    if (!/^\d*$/.test(val)) return;
    const next = [...pinDigits];
    next[i] = val.slice(-1);
    setPinDigits(next);
    setPinError(false);
    if (val && i < 3) focusPin(i + 1);
    if (next.every(d => d !== '')) {
      if (next.join('') === APP_PIN) {
        setUnlocked(true);
      } else {
        setPinError(true);
        setTimeout(() => { setPinDigits(['','','','']); setPinError(false); focusPin(0); }, 700);
      }
    }
  };
  const handlePinKeyDown = (i, e) => {
    if (e.key === 'Backspace' && !pinDigits[i] && i > 0) focusPin(i - 1);
  };

  // Auto-focus first PIN input on page load
  useEffect(() => {
    if (!unlocked) focusPin(0);
  }, []);

  const [mmSteps, setMmSteps] = useState({ me21n:false, migo_gr:false, miro:false, f53:false });
  const [ppSteps, setPpSteps] = useState({
    co01_h:false, gi_h:false, co11n_h:false, gr_h:false,
    co01_f:false, gi_f:false, co11n_f:false, gr_f:false,
    ko88_h:false, ko88_f:false
  });
  const [ficoSteps, setFicoSteps] = useState({ kss2:false, sl_roh:false, sl_halb:false, ml:false, pc:false, ke27:false });
  const [overheadSteps, setOverheadSteps] = useState({ fb50:false, ksb1:false, ksu5:false, ke30:false });
  const [sdSteps, setSdSteps] = useState({ va01:false, vl01n:false, vf01:false, f28:false });
  const [ckSteps, setCkSteps] = useState({ kp26:false, ck11n_h:false, ck24_h:false, ck11n_f:false, ck24_f:false });

  /* ---- C-3 extended scenario steps ---- */
  const [mmReturnSteps, setMmReturnSteps] = useState({ ret_po:false, ret_migo:false });
  const [miSteps, setMiSteps] = useState({ mi01:false, mi04:false, mi07:false });
  const [sdebSteps, setSdebSteps] = useState({ miro_sd:false, miro_sd2:false, f53_sd:false });
  const [mr21Steps, setMr21Steps] = useState({ mr21:false });
  const [sdReturnSteps, setSdReturnSteps] = useState({ ret_so:false, ret_del:false, ret_credit:false });

  /* ---- MM derived data ---- */
  const mmInv = useMemo(() => {
    const mm0 = simParams.mm[0] || { matCode:'RM001', qty:100, stdPrice:5.50, poPrice:5.00, vendor:'V001' };
    const qty = mmSteps.migo_gr ? mm0.qty : 0;
    const amt = mmSteps.migo_gr ? +(mm0.qty * mm0.stdPrice).toFixed(2) : 0;
    return [{ code:mm0.matCode, uom:'KG', qty, amt }];
  }, [mmSteps, simParams]);
  const priceVar = useMemo(() => {
    const mm0 = simParams.mm[0] || { qty:100, stdPrice:5.50, poPrice:5.00 };
    return mmSteps.migo_gr ? +(mm0.qty * (mm0.stdPrice - mm0.poPrice)).toFixed(2) : 0;
  }, [mmSteps, simParams]);
  const apBalance = useMemo(() => {
    const mm0 = simParams.mm[0] || { qty:100, poPrice:5.00 };
    const inv = +(mm0.qty * mm0.poPrice).toFixed(2);
    let bal = 0;
    if (mmSteps.miro) bal += inv;
    if (mmSteps.f53)  bal -= inv;
    return bal;
  }, [mmSteps, simParams]);

  /* ---- PP derived data (linked to simParams + MM stock) ---- */
  const ppInv = useMemo(() => {
    const mm0  = simParams.mm[0]  || { matCode:'RM001', qty:100, stdPrice:5.50, poPrice:5.00 };
    const ppH0 = simParams.pp.find(o => o.outCode === 'SF001') || simParams.pp[0] ||
      { outCode:'SF001', outQty:20, components:[{code:'RM001',consumQty:60},{code:'RM002',consumQty:20}] };
    const ppF0 = simParams.pp.find(o => o.outCode === 'FG001') || simParams.pp[1] ||
      { outCode:'FG001', outQty:10, components:[{code:'SF001',consumQty:10},{code:'RM001',consumQty:5}] };

    const mm1 = simParams.mm.find(m => m.matCode === 'RM002') || { qty:20, stdPrice:3.20, poPrice:3.20 };
    const rm001Std = mm0.stdPrice;
    const rm002Std = mm1.stdPrice;
    const sf001Std = parseFloat((materials.find(m => m.MaterialCode === 'SF001') || {StandardPrice:'18.00'}).StandardPrice);
    const fg001Std = parseFloat((materials.find(m => m.MaterialCode === 'FG001') || {StandardPrice:'45.00'}).StandardPrice);

    let rm001 = mmSteps.migo_gr ? mm0.qty : 0;
    const rm001_h = (ppH0.components.find(c=>c.code==='RM001') || {consumQty:60}).consumQty;
    const rm001_f = (ppF0.components.find(c=>c.code==='RM001') || {consumQty:5}).consumQty;
    if (ppSteps.gi_h) rm001 -= rm001_h;
    if (ppSteps.gi_f) rm001 -= rm001_f;

    const rm002_h = (ppH0.components.find(c=>c.code==='RM002') || {consumQty:20}).consumQty;
    let rm002 = mmSteps.migo_gr ? mm1.qty : 0;
    if (ppSteps.gi_h) rm002 -= rm002_h;

    let halb = 0;
    if (ppSteps.gr_h) halb += ppH0.outQty;
    const sf001_f = (ppF0.components.find(c=>c.code==='SF001') || {consumQty:10}).consumQty;
    if (ppSteps.gi_f) halb -= sf001_f;

    let fert = 0;
    if (ppSteps.gr_f) fert += ppF0.outQty;

    return [
      { code:'RM001', uom:'KG', qty:rm001, amt:+(rm001 * rm001Std).toFixed(2) },
      { code:'RM002', uom:'KG', qty:rm002, amt:+(rm002 * rm002Std).toFixed(2) },
      { code:'SF001', uom:'EA', qty:halb,  amt:+(halb  * sf001Std).toFixed(2) },
      { code:'FG001', uom:'EA', qty:fert,  amt:+(fert  * fg001Std).toFixed(2) },
    ];
  }, [ppSteps, mmSteps, simParams, materials]);

  const wip = useMemo(() => {
    const ppH0 = simParams.pp.find(o => o.outCode === 'SF001') || simParams.pp[0] ||
      { outQty:20, components:[{code:'RM001',consumQty:60},{code:'RM002',consumQty:20}],
        laborHr:20, laborRate:14.675, machineHr:10, machineRate:14.00, ohRate:0 };
    const ppF0 = simParams.pp.find(o => o.outCode === 'FG001') || simParams.pp[1] ||
      { outQty:10, components:[{code:'SF001',consumQty:10},{code:'RM001',consumQty:5}],
        laborHr:5, laborRate:25, machineHr:2.5, machineRate:35, ohRate:0 };

    const sf001Std = parseFloat((materials.find(m => m.MaterialCode === 'SF001') || {StandardPrice:'18.00'}).StandardPrice);
    const fg001Std = parseFloat((materials.find(m => m.MaterialCode === 'FG001') || {StandardPrice:'45.00'}).StandardPrice);

    const hGI  = (ppH0.components || []).reduce((s,c) => {
      const std = parseFloat((materials.find(m=>m.MaterialCode===c.code)||{StandardPrice:'0'}).StandardPrice);
      return s + c.consumQty * std;
    }, 0);
    const hActivity = ppH0.laborHr * ppH0.laborRate + ppH0.machineHr * ppH0.machineRate +
      (ppH0.laborHr * ppH0.laborRate + ppH0.machineHr * ppH0.machineRate) * (ppH0.ohRate/100);
    const hGR  = ppH0.outQty * sf001Std;
    const hKO88 = hGI + hActivity - hGR;

    let halb = 0;
    if (ppSteps.gi_h)    halb += hGI;
    if (ppSteps.co11n_h) halb += hActivity;
    if (ppSteps.gr_h)    halb -= hGR;
    if (ppSteps.ko88_h)  halb -= hKO88;

    const fGI = (ppF0.components || []).reduce((s,c) => {
      const std = parseFloat((materials.find(m=>m.MaterialCode===c.code)||{StandardPrice:'0'}).StandardPrice);
      return s + c.consumQty * std;
    }, 0);
    const fActivity = ppF0.laborHr * ppF0.laborRate + ppF0.machineHr * ppF0.machineRate +
      (ppF0.laborHr * ppF0.laborRate + ppF0.machineHr * ppF0.machineRate) * (ppF0.ohRate/100);
    const fGR  = ppF0.outQty * fg001Std;
    const fKO88 = fGI + fActivity - fGR;

    let fert = 0;
    if (ppSteps.gi_f)    fert += fGI;
    if (ppSteps.co11n_f) fert += fActivity;
    if (ppSteps.gr_f)    fert -= fGR;
    if (ppSteps.ko88_f)  fert -= fKO88;

    return { halb: +halb.toFixed(2), fert: +fert.toFixed(2) };
  }, [ppSteps, simParams, materials]);

  const ppVar = useMemo(() => {
    const ppH0 = simParams.pp.find(o => o.outCode === 'SF001') || simParams.pp[0] ||
      { outQty:20, components:[{code:'RM001',consumQty:60},{code:'RM002',consumQty:20}],
        laborHr:20, laborRate:14.675, machineHr:10, machineRate:14.00, ohRate:0 };
    const ppF0 = simParams.pp.find(o => o.outCode === 'FG001') || simParams.pp[1] ||
      { outQty:10, components:[{code:'SF001',consumQty:10},{code:'RM001',consumQty:5}],
        laborHr:5, laborRate:25, machineHr:2.5, machineRate:35, ohRate:0 };

    const sf001Std = parseFloat((materials.find(m=>m.MaterialCode==='SF001')||{StandardPrice:'18.00'}).StandardPrice);
    const fg001Std = parseFloat((materials.find(m=>m.MaterialCode==='FG001')||{StandardPrice:'45.00'}).StandardPrice);

    const hGI = (ppH0.components||[]).reduce((s,c)=>{
      const std=parseFloat((materials.find(m=>m.MaterialCode===c.code)||{StandardPrice:'0'}).StandardPrice);
      return s+c.consumQty*std;
    },0);
    const hAct = ppH0.laborHr*ppH0.laborRate + ppH0.machineHr*ppH0.machineRate +
      (ppH0.laborHr*ppH0.laborRate+ppH0.machineHr*ppH0.machineRate)*(ppH0.ohRate/100);
    const hVar = +((hGI + hAct) - ppH0.outQty * sf001Std).toFixed(2);

    const fGI = (ppF0.components||[]).reduce((s,c)=>{
      const std=parseFloat((materials.find(m=>m.MaterialCode===c.code)||{StandardPrice:'0'}).StandardPrice);
      return s+c.consumQty*std;
    },0);
    const fAct = ppF0.laborHr*ppF0.laborRate + ppF0.machineHr*ppF0.machineRate +
      (ppF0.laborHr*ppF0.laborRate+ppF0.machineHr*ppF0.machineRate)*(ppF0.ohRate/100);
    const fVar = +((fGI + fAct) - ppF0.outQty * fg001Std).toFixed(2);

    return {
      halb: ppSteps.ko88_h ? hVar : 0,
      fert: ppSteps.ko88_f ? fVar : 0,
    };
  }, [ppSteps, simParams, materials]);

  /* ---- FI/CO derived ---- */
  const ficoDone = ficoSteps.pc;
  const copa = useMemo(() => {
    const sd0 = simParams.sd[0] || { matCode:'FG001', qty:5, salesPrice:150 };
    const fg001Std = parseFloat((materials.find(m=>m.MaterialCode==='FG001')||{StandardPrice:'45.00'}).StandardPrice);
    const stdCOGS = +(sd0.qty * fg001Std).toFixed(2);

    const mm0  = simParams.mm[0]  || { qty:100, stdPrice:5.50, poPrice:5.00 };
    const ppH0 = simParams.pp.find(o=>o.outCode==='SF001') || simParams.pp[0] ||
      { outQty:20, components:[{code:'RM001',consumQty:60},{code:'RM002',consumQty:20}],
        laborHr:20, laborRate:14.675, machineHr:10, machineRate:14.00, ohRate:0 };
    const ppF0 = simParams.pp.find(o=>o.outCode==='FG001') || simParams.pp[1] ||
      { outQty:10, components:[{code:'SF001',consumQty:10},{code:'RM001',consumQty:5}],
        laborHr:5, laborRate:25, machineHr:2.5, machineRate:35, ohRate:0 };

    const sf001Std = parseFloat((materials.find(m=>m.MaterialCode==='SF001')||{StandardPrice:'18.00'}).StandardPrice);
    const mmPPV = +(mm0.qty * (mm0.stdPrice - mm0.poPrice)).toFixed(2);
    const hGI   = (ppH0.components||[]).reduce((s,c)=>{
      const std=parseFloat((materials.find(m=>m.MaterialCode===c.code)||{StandardPrice:'0'}).StandardPrice);
      return s+c.consumQty*std;
    },0);
    const hAct  = ppH0.laborHr*ppH0.laborRate+ppH0.machineHr*ppH0.machineRate;
    const hVar  = (hGI+hAct) - ppH0.outQty*sf001Std;
    const fGI   = (ppF0.components||[]).reduce((s,c)=>{
      const std=parseFloat((materials.find(m=>m.MaterialCode===c.code)||{StandardPrice:'0'}).StandardPrice);
      return s+c.consumQty*std;
    },0);
    const fAct  = ppF0.laborHr*ppF0.laborRate+ppF0.machineHr*ppF0.machineRate;
    const fVar  = (fGI+fAct) - ppF0.outQty*fg001Std;
    const mlAdj = +((hVar - mmPPV*0.65)/2 + fVar).toFixed(2) / 2;
    const actualCOGS = +(stdCOGS + (ficoDone ? mlAdj : 0)).toFixed(2);
    return { actualCOGS };
  }, [ficoSteps, simParams, materials]);

  /* ---- SD derived data ---- */
  const sdInv = useMemo(() => {
    const sd0 = simParams.sd[0] || { matCode:'FG001', qty:5 };
    const fg001Std = parseFloat((materials.find(m=>m.MaterialCode==='FG001')||{StandardPrice:'45.00'}).StandardPrice);
    const ppF0 = simParams.pp.find(o=>o.outCode==='FG001') || simParams.pp[1] || { outQty:10 };
    let fert = ppSteps.gr_f ? ppF0.outQty : 0;
    if (sdSteps.vl01n) fert -= sd0.qty;
    return [{ code:sd0.matCode, uom:'EA', qty:fert, amt:+(fert * fg001Std).toFixed(2) }];
  }, [sdSteps, ppSteps, simParams, materials]);

  const arBalance = useMemo(() => {
    const sd0 = simParams.sd[0] || { qty:5, salesPrice:150 };
    const rev = +(sd0.qty * sd0.salesPrice).toFixed(2);
    let bal = 0;
    if (sdSteps.vf01) bal += rev;
    if (sdSteps.f28)  bal -= rev;
    return bal;
  }, [sdSteps, simParams]);

  const revenue = useMemo(() => {
    const sd0 = simParams.sd[0] || { qty:5, salesPrice:150 };
    return sdSteps.vf01 ? +(sd0.qty * sd0.salesPrice).toFixed(2) : 0;
  }, [sdSteps, simParams]);

  const tabLabels = T[lang].tabs;
  const tabs = [
    { id:'params',  label:tabLabels[6], icon:'🎛️' },
    { id:'master',  label:tabLabels[0], icon:'📋' },
    { id:'mm',      label:tabLabels[1], icon:'🛒' },
    { id:'pp',      label:tabLabels[2], icon:'🏭' },
    { id:'fico',    label:tabLabels[3], icon:'🧮' },
    { id:'overhead', label:lang==='ko'?'일반경비':'General/Overhead Expense', icon:'🧾' },
    { id:'sd',      label:tabLabels[4], icon:'💵' },
    { id:'ledger',  label:tabLabels[5], icon:'📒' },
    { id:'dryrun',  label:'Dryrun',     icon:'📊' },
    { id:'flow',    label:'Flow',       icon:'🔀' },
    { id:'script',  label:lang==='ko'?'시나리오':'Script', icon:'📝' },
    { id:'copa',    label:lang==='ko'?'CO-PA 수익성':'CO-PA', icon:'📈' },
    { id:'costmodel', label:lang==='ko'?'원가모델 비교':'Costing Models', icon:'⚖️' },
    { id:'home_field', label:lang==='ko'?'홈':'Home', icon:'🏠' },
    { id:'home_acct',  label:lang==='ko'?'시작 가이드':'Start Guide', icon:'🧭' },
  ];

  const TAB_GROUPS = [
    { id:'grp_home_acct',label:lang==='ko'?'시작 가이드':'Start', icon:'🧭', tabIds:['home_acct'] },
    { id:'grp_tour',     label:'Tour',     icon:'🗺️', tabIds:['flow','dryrun','script'] },
    { id:'grp_params',   label:'Intro',    icon:'🎛️', tabIds:['params'] },
    { id:'grp_ledger',   label:'Ledger',   icon:'📋', tabIds:['master'] },
    { id:'grp_business', label:'Business', icon:'🏢', tabIds:['mm','pp','sd'] },
    { id:'grp_finance',  label:'Finance',  icon:'💹', tabIds:['fico','overhead','copa','costmodel'] },
    { id:'grp_journal',  label:lang==='ko'?'분개원장':'Journal', icon:'📒', tabIds:['ledger'] },
  ];
  // 현업 모드 — 역할(Role) 기준 재배치 (SAP Fiori 역할기반 원칙). 각 탭 1회 배정.
  const ROLE_GROUPS = [
    { id:'role_home',    label:lang==='ko'?'홈':'Home',           icon:'🏠', tabIds:['home_field'] },
    { id:'role_master',  label:lang==='ko'?'마스터':'Master',     icon:'🗂️', tabIds:['master'] },
    { id:'role_buy',     label:lang==='ko'?'구매':'Purchasing',   icon:'🛒', tabIds:['mm'] },
    { id:'role_prod',    label:lang==='ko'?'생산':'Production',   icon:'🏭', tabIds:['pp'] },
    { id:'role_sales',   label:lang==='ko'?'영업':'Sales',        icon:'💵', tabIds:['sd'] },
    { id:'role_costing', label:lang==='ko'?'원가·결산':'Costing & Close', icon:'📊', tabIds:['fico','costmodel','overhead','copa','ledger'] },
    { id:'role_guide',   label:lang==='ko'?'가이드':'Guide',      icon:'🗺️', tabIds:['flow','dryrun','script','params'] },
  ];
  const NAV_GROUPS = viewMode === 'field' ? ROLE_GROUPS : TAB_GROUPS;
  const activeGroup = NAV_GROUPS.find(g => g.tabIds.includes(activeTab)) || NAV_GROUPS[0];
  const activeGroupTabs = activeGroup.tabIds.map(id => tabs.find(t => t.id === id)).filter(Boolean);

  return (
    <div className="min-h-screen">
      {showPopup && <JournalPopup data={popupData} onClose={() => setShowPopup(false)} />}

      <header className="bg-gradient-to-r from-slate-800 to-slate-700 text-white shadow-md">
        <div className="max-w-7xl mx-auto px-4 py-3">
          <div className="flex items-center gap-3">
            <span className="text-2xl">🏭</span>
            <div>
              <h1 className="font-bold text-lg">ERP Process Learning Simulator — {COMPANY.name}</h1>
              <p className="text-xs text-slate-300">
                Company Code {COMPANY.code} · Plant {COMPANY.plant} ({COMPANY.plantName})
              </p>
            </div>
            <div className="ml-auto flex flex-row flex-wrap items-center justify-end gap-2">
              {/* Language */}
              <button
                onClick={() => setLang(l => l === 'ko' ? 'en' : 'ko')}
                className="flex items-center gap-1 px-3 py-1 rounded-full border border-slate-500 text-xs font-semibold text-slate-200 hover:bg-slate-700 transition-colors"
              >
                {lang === 'ko' ? '🇺🇸 EN' : '🇰🇷 KO'}
              </button>
              <div className="w-px h-5 bg-white/15 mx-0.5" />
              {/* View Mode: 현업(Field) vs 회계(Accounting) */}
              <div className="flex items-center rounded-full border border-slate-500 overflow-hidden text-xs font-semibold">
                <button
                  onClick={() => { setViewMode('field'); setActiveTab('home_field'); }}
                  className={`px-3 py-1 transition-colors ${viewMode==='field' ? 'bg-indigo-500 text-white' : 'text-slate-200 hover:bg-slate-700'}`}>
                  {lang==='ko' ? '🧑‍🏭 현업' : '🧑‍🏭 Field'}
                </button>
                <button
                  onClick={() => { setViewMode('accounting'); setActiveTab('home_acct'); }}
                  className={`px-3 py-1 transition-colors ${viewMode==='accounting' ? 'bg-teal-600 text-white' : 'text-slate-200 hover:bg-slate-700'}`}>
                  {lang==='ko' ? '🧮 회계' : '🧮 Accounting'}
                </button>
              </div>
              <div className="w-px h-5 bg-white/15 mx-0.5" />
              {/* Learning tools (Intro Tour / T-code Map / Lead Guide) — app-switcher style */}
              <LearningToolsSwitcher lang={lang} />
            </div>
          </div>
          {/* PIN Row (above Group Nav) */}
          <div className="mt-2 flex items-center gap-2 border-b border-white/10 pb-2">
            {unlocked ? (
              <span className="text-xs text-green-300 flex items-center gap-1.5">
                <span>✅</span>
                <span>{lang==='ko' ? '인증 완료 — 전체 메뉴 활성화' : 'Authenticated — Full access'}</span>
              </span>
            ) : (
              <div className="flex items-center gap-2" ref={pinContainerRef}>
                <span className="text-xs text-slate-300">🔐 PIN:</span>
                {pinDigits.map((d, i) => (
                  <input key={i} type="password" inputMode="numeric" maxLength={1} value={d}
                    autoFocus={i === 0}
                    onChange={e => handlePinInput(i, e.target.value)}
                    onKeyDown={e => handlePinKeyDown(i, e)}
                    className={`w-8 h-8 text-center text-sm font-bold rounded border-2 bg-slate-700 text-white outline-none transition-colors
                      ${pinError ? 'border-red-400 bg-red-900/40 animate-pulse' : 'border-slate-500 focus:border-indigo-400'}`}
                  />
                ))}
                <span className="text-xs text-slate-400">{lang==='ko' ? '4자리 입력' : 'Enter 4 digits'}</span>
                {pinError && <span className="text-xs text-red-400 font-semibold">❌</span>}
              </div>
            )}
          </div>
          {/* Scenario Progress (global stepper) */}
          {unlocked && (
            <ScenarioProgress ckSteps={ckSteps} mmSteps={mmSteps} ppSteps={ppSteps} ficoSteps={ficoSteps} sdSteps={sdSteps}
              activeTab={activeTab} setActiveTab={setActiveTab} lang={lang} />
          )}
          {/* Group Nav (Top Level) — mobile only; sm and up uses the left sidebar instead */}
          <nav className="flex gap-1 mt-2 sm:hidden">
            {NAV_GROUPS.map(g => (
              <button key={g.id}
                onClick={() => unlocked && setActiveTab(g.tabIds[0])}
                disabled={!unlocked}
                className={`px-5 py-1.5 font-bold rounded-t transition-all tracking-wide
                  ${g.id==='grp_ledger' ? 'text-[0.825rem]' : 'text-xs'}
                  ${!unlocked ? 'opacity-40 cursor-not-allowed' : ''}
                  ${activeGroup.id===g.id && unlocked
                    ? (viewMode==='field' ? 'bg-indigo-500 text-white shadow-sm' : 'bg-teal-600 text-white shadow-sm')
                    : 'bg-white/10 text-slate-300 hover:bg-white/20 hover:text-white'}`}>
                {g.icon} {g.label}
              </button>
            ))}
          </nav>
          {/* Sub-Tab Nav */}
          <nav className="flex gap-1 flex-wrap border-t border-white/10 pt-0.5">
            {activeGroupTabs.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)}
                className={`px-4 py-2 rounded-t-lg text-sm font-medium transition-all
                  ${activeTab===t.id ? 'bg-slate-100 text-slate-800' : 'bg-white/10 text-white hover:bg-white/20'}`}>
                {t.icon} {t.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      <div className="max-w-7xl mx-auto px-4 flex gap-4 items-start">
        {/* Left slim sidebar (Group Nav) — sm and up only; mobile keeps the horizontal nav in the header */}
        <aside className="hidden sm:block w-24 shrink-0 py-5">
          <nav className="flex flex-col gap-1 sticky top-4">
            {NAV_GROUPS.map(g => (
              <button key={g.id}
                onClick={() => unlocked && setActiveTab(g.tabIds[0])}
                disabled={!unlocked}
                title={g.label}
                className={`flex flex-col items-center justify-center gap-0.5 px-1 py-2 rounded-lg text-center transition-all
                  ${!unlocked ? 'opacity-40 cursor-not-allowed' : ''}
                  ${activeGroup.id===g.id && unlocked
                    ? (viewMode==='field' ? 'bg-indigo-500 text-white shadow-sm' : 'bg-teal-600 text-white shadow-sm')
                    : 'bg-white text-slate-600 border border-slate-200 hover:border-slate-400 hover:text-slate-800'}`}>
                <span className="text-lg leading-none">{g.icon}</span>
                <span className="text-[9px] font-semibold leading-tight">{g.label}</span>
              </button>
            ))}
          </nav>
        </aside>

      <main className="flex-1 min-w-0 py-5 relative">
        {!unlocked && (
          <div className="absolute inset-0 bg-slate-100/90 backdrop-blur-sm flex flex-col items-center justify-center z-20 rounded-lg" style={{minHeight:'300px'}}>
            <div className="text-6xl mb-4">🔐</div>
            <p className="text-base font-semibold text-slate-600">
              {lang==='ko' ? 'PIN을 입력하면 메뉴가 활성화됩니다' : 'Enter PIN above to activate the menu'}
            </p>
            <p className="text-xs text-slate-400 mt-1 mb-5">
              {lang==='ko' ? '상단의 4자리 PIN 입력란을 이용하세요' : 'Use the 4-digit PIN field at the top'}
            </p>
            <IntroButton lang={lang} cta />
            <p className="text-[11px] text-slate-400 mt-2">
              {lang==='ko' ? 'PIN 없이도 전체 구조를 미리 볼 수 있어요' : 'Preview the full structure — no PIN needed'}
            </p>
          </div>
        )}
        {unlocked && <ModeBanner viewMode={viewMode} lang={lang} />}
        {unlocked && viewMode==='accounting' && activeTab==='home_acct' && <AcctRoadmap lang={lang} setActiveTab={setActiveTab} />}
        {unlocked && viewMode==='field' && activeTab==='home_field' && <RoleLaunchpad lang={lang} setActiveTab={setActiveTab}
          ckSteps={ckSteps} mmSteps={mmSteps} ppSteps={ppSteps} ficoSteps={ficoSteps} sdSteps={sdSteps} />}
        {unlocked && viewMode==='field' && activeTab!=='home_field' && <RoleGuide tab={activeTab} lang={lang} />}
        {activeTab==='params'  && <ParametersTab simParams={simParams} setSimParams={setSimParams} materials={materials} lang={lang} />}
        {activeTab==='master' && <MasterTab materials={materials} setMaterials={setMaterials} ckSteps={ckSteps} setCkSteps={setCkSteps} openPopup={openPopup} simParams={simParams} lang={lang} />}
        {activeTab==='mm' && <MMTab mmSteps={mmSteps} setMmSteps={setMmSteps} openPopup={openPopup} mmInv={mmInv} apBalance={apBalance} priceVar={priceVar} lang={lang} mmReturnSteps={mmReturnSteps} setMmReturnSteps={setMmReturnSteps} miSteps={miSteps} setMiSteps={setMiSteps} sdebSteps={sdebSteps} setSdebSteps={setSdebSteps} simParams={simParams} materials={materials} />}
        {activeTab==='pp' && <PPTab ppSteps={ppSteps} setPpSteps={setPpSteps} openPopup={openPopup} ppInv={ppInv} wip={wip} ppVar={ppVar} lang={lang} simParams={simParams} materials={materials} />}
        {activeTab==='fico' && <FICOTab ficoSteps={ficoSteps} setFicoSteps={setFicoSteps} openPopup={openPopup} copa={copa} lang={lang} mr21Steps={mr21Steps} setMr21Steps={setMr21Steps} simParams={simParams} materials={materials} />}
        {activeTab==='overhead' && <OverheadTab overheadSteps={overheadSteps} setOverheadSteps={setOverheadSteps} openPopup={openPopup} lang={lang} simParams={simParams} materials={materials} />}
        {activeTab==='sd' && <SDTab sdSteps={sdSteps} setSdSteps={setSdSteps} openPopup={openPopup} sdInv={sdInv} arBalance={arBalance} revenue={revenue} ficoDone={ficoDone} lang={lang} sdReturnSteps={sdReturnSteps} setSdReturnSteps={setSdReturnSteps} simParams={simParams} materials={materials} copa={copa} />}
        {activeTab==='ledger' && <LedgerTab mmSteps={mmSteps} ppSteps={ppSteps} ficoSteps={ficoSteps} sdSteps={sdSteps} ckSteps={ckSteps} materials={materials} lang={lang} />}
        {activeTab==='dryrun' && <DryrunTab lang={lang} />}
        {activeTab==='flow' && <FlowTab lang={lang} />}
        {activeTab==='script' && <ScriptTab lang={lang} />}
        {activeTab==='copa' && <COPATab ficoSteps={ficoSteps} sdSteps={sdSteps} ppSteps={ppSteps} lang={lang} />}
        {activeTab==='costmodel' && <CostModelTab lang={lang} />}
      </main>
      </div>

      <footer className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-400">
        ERP Process Learning Simulator (ECC-style FI/CO) · Vendor {VENDOR.code} ({VENDOR.name}) · Customer {CUSTOMER.code} ({CUSTOMER.name})
        <br/>{T[lang].footerFlow}
        <br/>
        <span className="block mt-2 text-[10px] text-slate-400 leading-relaxed">
          {lang === 'ko'
            ? 'SAP 및 SAP ECC는 SAP SE의 등록상표입니다. 본 솔루션은 ERP 비즈니스 프로세스 학습을 위한 독립 교육용 시뮬레이터이며, SAP SE와 제휴·후원·보증 관계가 없습니다. 모든 회사·거래처·금액 데이터는 가상의 예시입니다.'
            : 'SAP and SAP ECC are registered trademarks of SAP SE. This is an independent educational simulator for learning ERP business processes and is not affiliated with, endorsed by, or sponsored by SAP SE. All company, partner, and financial data shown are fictitious examples.'}
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
