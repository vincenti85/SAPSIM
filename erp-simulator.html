function stdOf(mats, code) {
  const m = mats.find(r => r.MaterialCode === code);
  return m ? parseFloat(m.StandardPrice) : 0;
}

function buildJournals(p, mats, lang) {
  // ── MM helpers ──
  const mm = p.mm[0] || { matCode:'RM001', qty:100, poPrice:5.00, stdPrice:5.50, vendor:'V001' };
  const mmQty        = mm.qty;
  const mmStd        = mm.stdPrice;
  const mmPO         = mm.poPrice;
  const mmInventory  = +(mmQty * mmStd).toFixed(2);
  const mmGRIR       = +(mmQty * mmPO).toFixed(2);
  const mmPPV        = +(mmQty * (mmStd - mmPO)).toFixed(2);
  const mmVendor     = mm.vendor || 'V001';

  // ── PP helpers ──
  const ppH = p.pp.find(o => o.outCode === 'SF001') || p.pp[0] ||
    { outCode:'SF001', outQty:20, components:[], laborHr:20, laborRate:14.675, machineHr:10, machineRate:14.00, ohRate:0 };
  const ppF = p.pp.find(o => o.outCode === 'FG001') || p.pp[1] ||
    { outCode:'FG001', outQty:10, components:[], laborHr:5, laborRate:25, machineHr:2.5, machineRate:35, ohRate:0 };

  const hCompLines = (ppH.components || []).map(c => {
    const std = stdOf(mats, c.code);
    return { code:c.code, qty:c.consumQty, std, amt:+(c.consumQty * std).toFixed(2) };
  });
  const hGI = hCompLines.reduce((s, c) => s + c.amt, 0);

  const hLabor   = +(ppH.laborHr   * ppH.laborRate  ).toFixed(2);
  const hMachine = +(ppH.machineHr * ppH.machineRate ).toFixed(2);
  const hOH      = +((hLabor + hMachine) * (ppH.ohRate / 100)).toFixed(2);
  const hActivity = +(hLabor + hMachine + hOH).toFixed(2);

  const hStd = stdOf(mats, 'SF001');
  const hGRamt = +(ppH.outQty * hStd).toFixed(2);
  const hActual = +(hGI + hActivity).toFixed(2);
  const hVariance = +(hActual - hGRamt).toFixed(2);

  const fCompLines = (ppF.components || []).map(c => {
    const std = stdOf(mats, c.code);
    return { code:c.code, qty:c.consumQty, std, amt:+(c.consumQty * std).toFixed(2) };
  });
  const fGI = fCompLines.reduce((s, c) => s + c.amt, 0);

  const fLabor   = +(ppF.laborHr   * ppF.laborRate  ).toFixed(2);
  const fMachine = +(ppF.machineHr * ppF.machineRate ).toFixed(2);
  const fOH      = +((fLabor + fMachine) * (ppF.ohRate / 100)).toFixed(2);
  const fActivity = +(fLabor + fMachine + fOH).toFixed(2);

  const fStd = stdOf(mats, 'FG001');
  const fGRamt = +(ppF.outQty * fStd).toFixed(2);
  const fActual   = +(fGI + fActivity).toFixed(2);
  const fVariance = +(fActual - fGRamt).toFixed(2);

  // ── SD helpers ──
  const sd = p.sd[0] || { matCode:'FG001', qty:5, salesPrice:150, customer:'C001' };
  const sdQty   = sd.qty;
  const sdPrice = sd.salesPrice;
  const sdCOGSu = stdOf(mats, sd.matCode) || fStd;
  const sdCOGS  = +(sdQty * sdCOGSu).toFixed(2);
  const sdRev   = +(sdQty * sdPrice).toFixed(2);
  const sdCust  = sd.customer || 'C001';

  return {

    kp26: {
      ko: { tcode:'KP26', title:'액티비티 단가 계획', lines:[
        { account:`CC001 노무비: $${ppH.laborRate.toFixed(2)}/h (계획)` },

    { h:{ ko:'비즈니스 현실 (SAP 이전)', en:'Business reality (before SAP)' } }, { p:{ ko:'자재 부족 → 공급사·단가 결정 → 주문서 발송 → 입고·검수 → 청구서 수령 → 주문/입고와 대조 → 대금 지급. 핵심 긴장: 발주가와 회계 표준가가 다를 수 있고, 그 차이가 원가 분석의 단서가 된다.', en:'Material runs low → choose supplier and price → send PO → receive and inspect → receive invoice → match against PO/receipt → pay. Key tension: the PO price and the accounting standard price may differ, and that difference becomes a clue for cost analysis.' } },

const GuideBlock = ({ b, lang }) => {

  if (b.flow) { const items = pick(b.flow); return <div className="flex flex-wrap items-center gap-1.5 mb-2">{items.map((x, i) => <React.Fragment key={i}><span className="bg-emerald-100 text-emerald-800 text-xs font-semibold px-2.5 py-1 rounded-full">{x}</span>{i < items.length - 1 && <span className="text-slate-400">→</span>}</React.Fragment>)}</div>; }
  if (b.tbl) { const t = pick(b.tbl); return (

  return null;
};

   ========================================================================= */
const StepButton = ({ steps, setSteps, stepKey, label, color='blue', journalData, onExecute, onCancel, openPopup, disabled=false, lang='ko' }) => {
  const colors = {
    blue:'bg-blue-500 hover:bg-blue-600', orange:'bg-orange-500 hover:bg-orange-600',
    indigo:'bg-indigo-500 hover:bg-indigo-600', teal:'bg-teal-500 hover:bg-teal-600',
    green:'bg-green-500 hover:bg-green-600', purple:'bg-purple-500 hover:bg-purple-600',
    red:'bg-red-500 hover:bg-red-600'
  };
  const done = !!steps[stepKey];
  const execute = () => {
    if (disabled) return;
    setSteps(prev => ({ ...prev, [stepKey]: true }));
    if (journalData) openPopup(journalData);
    onExecute?.();
  };
  const cancel = () => {
    const keys = Object.keys(steps);
    const idx = keys.indexOf(stepKey);
    setSteps(prev => {
      const next = { ...prev };
      keys.slice(idx).forEach(k => { next[k] = false; });
      return next;
    });
    onCancel?.();
  };
  return (
    <div className="flex gap-0.5 mb-1 items-center">
      <button onClick={execute} disabled={done || disabled}
        className={`flex items-center gap-1 px-3 py-1.5 rounded text-xs font-medium transition-all
          ${done ? 'bg-green-100 text-green-700 border border-green-300'
                 : disabled ? 'bg-slate-200 text-slate-400 cursor-not-allowed'
                 : `${colors[color]} text-white shadow-sm`}`}>
        {done ? '✓' : '▶'} {label}
      </button>
      {done && (
        <>
          {journalData && <button onClick={() => openPopup(journalData)}
            className="px-2 py-1 rounded text-xs bg-blue-100 text-blue-600 hover:bg-blue-200">{T[lang].journalBtn}</button>}
          <button onClick={cancel} className="px-2 py-1 rounded text-xs bg-red-100 text-red-600 hover:bg-red-200">↺</button>
        </>
      )}
    </div>
  );
};

/* =========================================================================
   BOM TREE
   ========================================================================= */
const BOMTree = ({ materials, lang='ko' }) => {
  const roots = materials.filter(m => String(m.BOMLevel) === '0');
  const getChildren = (parentCode, level) =>
    materials.filter(m => m.ParentMaterial === parentCode && String(m.BOMLevel) === String(level));
  const typeColor = { FG:'bg-blue-100 text-blue-800', SF:'bg-orange-100 text-orange-800', RM:'bg-green-100 text-green-800' };

  const BOMNode = ({ mat, depth=0 }) => {
    const children = getChildren(mat.MaterialCode, parseInt(mat.BOMLevel)+1);
    return (
      <div>
        <div className="flex items-center gap-2 py-1" style={{ paddingLeft: depth*20 }}>
          {depth > 0 && <span className="text-gray-400 text-xs">└─</span>}
          <span className={`text-xs px-1.5 py-0.5 rounded font-mono ${typeColor[mat.MaterialType]||'bg-gray-100'}`}>
            {mat.MaterialType}
          </span>
          <span className="text-sm font-mono font-medium">{mat.MaterialCode}</span>
          <span className="text-xs text-gray-600">{mat.Description}</span>
          {mat.Quantity && <span className="text-xs text-gray-400">× {mat.Quantity} {mat.UOM}</span>}
          <span className="text-xs text-blue-600 ml-auto font-semibold">${parseFloat(mat.StandardPrice).toFixed(2)}</span>
        </div>
        {children.map((c,i) => <BOMNode key={i} mat={c} depth={depth+1} />)}
      </div>
    );
  };

  if (roots.length === 0) return <p className="text-gray-400 text-sm p-4">{lang==='ko'?'자재를 업로드하면 BOM 트리가 표시됩니다':'Upload materials to display the BOM tree'}</p>;
  return <div>{roots.map((r,i) => <BOMNode key={i} mat={r} />)}</div>;
};

/* =========================================================================
   CSV PARSER
   ========================================================================= */
function parseCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n').filter(l => l.trim() !== '');
  if (lines.length < 2) throw new Error('CSV 데이터가 비어 있습니다');
  const header = lines[0].split(',').map(h => h.trim());
  const missing = REQUIRED_CSV_COLS.filter(c => !header.includes(c));
  if (missing.length > 0) throw new Error('필수 컬럼 누락: ' + missing.join(', '));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split(',').map(c => c.trim());
    const obj = {};
    header.forEach((h, idx) => { obj[h] = cells[idx] !== undefined ? cells[idx] : ''; });
    if (!obj.MaterialCode) continue;
    rows.push(obj);
  }
  if (rows.length === 0) throw new Error('유효한 자재 행이 없습니다');
  return rows;
}

      try {
        const rows = parseCSV(String(ev.target.result));
        setMaterials(rows);
        setSuccess(`업로드 성공: ${rows.length}개 자재 반영됨`);

                { acct:'매출채권 (AR)',    bal: (sdSteps.vf01?750:0) - (sdSteps.f28?750:0) },
                { acct:'매입채무 (AP)',    bal: (mmSteps.miro?500:0) - (mmSteps.f53?500:0) },
                { acct:'매출액',          bal: sdSteps.vf01?750:0 },
                { acct:'매출원가',        bal: (sdSteps.vl01n?225:0) + (ficoLedger.ml_pc?101.875:0) },

              <h3 className="text-xs font-semibold text-slate-700 mb-2">{t.plTitle}</h3>
              {(() => {
                const rev  = sdSteps.vf01  ? 750    : 0;
                const cogs = (sdSteps.vl01n ? 225    : 0) + (ficoLedger.ml_pc ? 101.875 : 0);
                const gp   = rev - cogs;
                const margin = rev > 0 ? (gp/rev*100).toFixed(1) : '—';
                return (
                  <div className="space-y-1.5 text-xs">
                    <div className="flex justify-between"><span className="text-slate-600">{t.plRevenue}</span><span className="font-semibold">${rev.toFixed(2)}</span></div>
                    <div className="flex justify-between"><span className="text-slate-600">{t.plCOGS}</span><span className="font-semibold text-red-600">-${cogs.toFixed(3)}</span></div>
                    <div className="flex justify-between border-t pt-1.5"><span className="font-bold text-slate-700">{t.plGP}</span><span className={`font-bold ${gp>0?'text-green-600':'text-red-600'}`}>${gp.toFixed(3)} ({margin}%)</span></div>
                    {ficoLedger.ml_pc && <p className="text-slate-400 italic mt-1">{lang==='ko'?'ML 결산 후 실제원가 반영':'Actual cost reflected after ML settlement'}</p>}
                  </div>
                );
              })()}
            </div>
          </div>
        </>
      )}
    </div>
  );
};

    const svg = document.getElementById('flowSvg');
    if (!svg) return;
    const xml = new XMLSerializer().serializeToString(svg);
    if (type === 'svg') {
      const blob = new Blob([xml], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = 'business-flow.svg'; a.click();
      URL.revokeObjectURL(url); return;
    }
    const b64 = btoa(unescape(encodeURIComponent(xml)));
    const img = new Image();
    const vb = svg.viewBox.baseVal;
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = vb.width * 2; c.height = vb.height * 2;

      ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, c.width, c.height);
      ctx.drawImage(img, 0, 0, c.width, c.height);
      c.toBlob(b => { const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'business-flow.png'; a.click(); });

  const focusPin = (i) => {
    const inputs = pinContainerRef.current?.querySelectorAll('input');
    inputs?.[i]?.focus();
  };
  const handlePinInput = (i, val) => {
    if (!/^\d*$/.test(val)) return;
    const next = [...pinDigits];
    next[i] = val.slice(-1);
    setPinDigits(next);
    setPinError(false);
    if (val && i < 3) focusPin(i + 1);
    if (next.every(d => d !== '')) {
      if (next.join('') === APP_PIN) {
        setUnlocked(true);
      } else {
        setPinError(true);
        setTimeout(() => { setPinDigits(['','','','']); setPinError(false); focusPin(0); }, 700);
      }
    }
  };
  const handlePinKeyDown = (i, e) => {
    if (e.key === 'Backspace' && !pinDigits[i] && i > 0) focusPin(i - 1);
  };

    { id:'fico', label:tabLabels[3], icon:'🧮' },
    { id:'sd', label:tabLabels[4], icon:'💵' },
    { id:'ledger', label:tabLabels[5], icon:'📒' },
    { id:'dryrun', label:'Dryrun', icon:'📊' },
    { id:'flow', label:'Flow', icon:'🔀' },
    { id:'copa', label:lang==='ko'?'CO-PA 수익성':'CO-PA', icon:'📈' },
  ];

  const TAB_GROUPS = [
    { id:'grp_ledger',   label:'Ledger',   icon:'📋', tabIds:['master'] },
    { id:'grp_business', label:'Business', icon:'🏢', tabIds:['mm','pp','sd'] },
    { id:'grp_finance',  label:'Finance',  icon:'💹', tabIds:['fico','copa'] },
    { id:'grp_tour',     label:'Tour',     icon:'🗺️', tabIds:['dryrun','flow','ledger'] },
  ];
  const activeGroup = TAB_GROUPS.find(g => g.tabIds.includes(activeTab)) || TAB_GROUPS[0];
  const activeGroupTabs = activeGroup.tabIds.map(id => tabs.find(t => t.id === id)).filter(Boolean);

  return (
    <div className="min-h-screen">
      {showPopup && <JournalPopup data={popupData} onClose={() => setShowPopup(false)} />}

      <header className="bg-gradient-to-r from-slate-800 to-slate-700 text-white shadow-md">
        <div className="max-w-7xl mx-auto px-4 py-3">
          <div className="flex items-center gap-3">
            <span className="text-2xl">🏭</span>
            <div>
              <h1 className="font-bold text-lg">ERP Process Learning Simulator — {COMPANY.name}</h1>
              <p className="text-xs text-slate-300">
                Company Code {COMPANY.code} · Plant {COMPANY.plant} ({COMPANY.plantName})
              </p>
            </div>
            <div className="ml-auto flex flex-row flex-wrap items-center justify-end gap-2">
              {/* Language */}
              <button
                onClick={() => setLang(l => l === 'ko' ? 'en' : 'ko')}
                className="flex items-center gap-1 px-3 py-1 rounded-full border border-slate-500 text-xs font-semibold text-slate-200 hover:bg-slate-700 transition-colors"
              >
                {lang === 'ko' ? '🇺🇸 EN' : '🇰🇷 KO'}
              </button>
              <div className="w-px h-5 bg-white/15 mx-0.5" />
              {/* Tour (separate) */}
              <IntroButton lang={lang} />
              <div className="w-px h-5 bg-white/15 mx-0.5" />
              {/* Reference */}
              <MappingButton lang={lang} />
              <div className="w-px h-5 bg-white/15 mx-0.5" />
              {/* Team Lead Guide (separate) */}
              <GuideButton lang={lang} />
            </div>
          </div>
          {/* PIN Row (above Group Nav) */}
          <div className="mt-2 flex items-center gap-2 border-b border-white/10 pb-2">
            {unlocked ? (
              <span className="text-xs text-green-300 flex items-center gap-1.5">
                <span>✅</span>
                <span>{lang==='ko' ? '인증 완료 — 전체 메뉴 활성화' : 'Authenticated — Full access'}</span>
              </span>
            ) : (
              <div className="flex items-center gap-2" ref={pinContainerRef}>
                <span className="text-xs text-slate-300">🔐 PIN:</span>
                {pinDigits.map((d, i) => (
                  <input key={i} type="password" inputMode="numeric" maxLength={1} value={d}
                    autoFocus={i === 0}
                    onChange={e => handlePinInput(i, e.target.value)}
                    onKeyDown={e => handlePinKeyDown(i, e)}
                    className={`w-8 h-8 text-center text-sm font-bold rounded border-2 bg-slate-700 text-white outline-none transition-colors
                      ${pinError ? 'border-red-400 bg-red-900/40 animate-pulse' : 'border-slate-500 focus:border-indigo-400'}`}
                  />
                ))}
                <span className="text-xs text-slate-400">{lang==='ko' ? '4자리 입력' : 'Enter 4 digits'}</span>
                {pinError && <span className="text-xs text-red-400 font-semibold">❌</span>}
              </div>
            )}
          </div>
          {/* Group Nav (Top Level) */}
          <nav className="flex gap-1 mt-2">
            {TAB_GROUPS.map(g => (
              <button key={g.id}
                onClick={() => unlocked && setActiveTab(g.tabIds[0])}
                disabled={!unlocked}
                className={`px-5 py-1.5 font-bold rounded-t transition-all tracking-wide
                  ${g.id==='grp_ledger' ? 'text-[0.825rem]' : 'text-xs'}
                  ${!unlocked ? 'opacity-40 cursor-not-allowed' : ''}
                  ${activeGroup.id===g.id && unlocked
                    ? 'bg-indigo-500 text-white shadow-sm'
                    : 'bg-white/10 text-slate-300 hover:bg-white/20 hover:text-white'}`}>
                {g.icon} {g.label}
              </button>
            ))}
          </nav>
          {/* Sub-Tab Nav */}
          <nav className="flex gap-1 flex-wrap border-t border-white/10 pt-0.5">
            {activeGroupTabs.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)}
                className={`px-4 py-2 rounded-t-lg text-sm font-medium transition-all
                  ${activeTab===t.id ? 'bg-slate-100 text-slate-800' : 'bg-white/10 text-white hover:bg-white/20'}`}>
                {t.icon} {t.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-5 relative">
        {!unlocked && (
          <div className="absolute inset-0 bg-slate-100/90 backdrop-blur-sm flex flex-col items-center justify-center z-20 rounded-lg" style={{minHeight:'300px'}}>
            <div className="text-6xl mb-4">🔐</div>
            <p className="text-base font-semibold text-slate-600">
              {lang==='ko' ? 'PIN을 입력하면 메뉴가 활성화됩니다' : 'Enter PIN above to activate the menu'}
            </p>
            <p className="text-xs text-slate-400 mt-1 mb-5">
              {lang==='ko' ? '상단의 4자리 PIN 입력란을 이용하세요' : 'Use the 4-digit PIN field at the top'}
            </p>
            <IntroButton lang={lang} cta />
            <p className="text-[11px] text-slate-400 mt-2">
              {lang==='ko' ? 'PIN 없이도 전체 구조를 미리 볼 수 있어요' : 'Preview the full structure — no PIN needed'}
            </p>
          </div>
        )}
        {activeTab==='master' && <MasterTab materials={materials} setMaterials={setMaterials} ckSteps={ckSteps} setCkSteps={setCkSteps} openPopup={openPopup} lang={lang} />}
        {activeTab==='mm' && <MMTab mmSteps={mmSteps} setMmSteps={setMmSteps} openPopup={openPopup} mmInv={mmInv} apBalance={apBalance} priceVar={priceVar} lang={lang} mmReturnSteps={mmReturnSteps} setMmReturnSteps={setMmReturnSteps} miSteps={miSteps} setMiSteps={setMiSteps} sdebSteps={sdebSteps} setSdebSteps={setSdebSteps} />}
        {activeTab==='pp' && <PPTab ppSteps={ppSteps} setPpSteps={setPpSteps} openPopup={openPopup} ppInv={ppInv} wip={wip} ppVar={ppVar} lang={lang} />}
        {activeTab==='fico' && <FICOTab ficoSteps={ficoSteps} setFicoSteps={setFicoSteps} openPopup={openPopup} copa={copa} lang={lang} mr21Steps={mr21Steps} setMr21Steps={setMr21Steps} />}
        {activeTab==='sd' && <SDTab sdSteps={sdSteps} setSdSteps={setSdSteps} openPopup={openPopup} sdInv={sdInv} arBalance={arBalance} revenue={revenue} ficoDone={ficoDone} lang={lang} sdReturnSteps={sdReturnSteps} setSdReturnSteps={setSdReturnSteps} />}
        {activeTab==='ledger' && <LedgerTab mmSteps={mmSteps} ppSteps={ppSteps} ficoSteps={ficoSteps} sdSteps={sdSteps} ckSteps={ckSteps} materials={materials} lang={lang} />}
        {activeTab==='dryrun' && <DryrunTab lang={lang} />}
        {activeTab==='flow' && <FlowTab lang={lang} />}
        {activeTab==='copa' && <COPATab ficoSteps={ficoSteps} sdSteps={sdSteps} ppSteps={ppSteps} lang={lang} />}
      </main>

      <footer className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-400">
        ERP Process Learning Simulator (ECC-style FI/CO) · Vendor {VENDOR.code} ({VENDOR.name}) · Customer {CUSTOMER.code} ({CUSTOMER.name})
        <br/>{T[lang].footerFlow}
        <br/>
        <span className="block mt-2 text-[10px] text-slate-400 leading-relaxed">
          {lang === 'ko'
            ? 'SAP 및 SAP ECC는 SAP SE의 등록상표입니다. 본 솔루션은 ERP 비즈니스 프로세스 학습을 위한 독립 교육용 시뮬레이터이며, SAP SE와 제휴·후원·보증 관계가 없습니다. 모든 회사·거래처·금액 데이터는 가상의 예시입니다.'
            : 'SAP and SAP ECC are registered trademarks of SAP SE. This is an independent educational simulator for learning ERP business processes and is not affiliated with, endorsed by, or sponsored by SAP SE. All company, partner, and financial data shown are fictitious examples.'}
        </span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
