<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inclusive Design Patterns — Accessible UI Components</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<style>
  body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

  /* ── Focus ring: always visible, never hidden ── */
  :focus-visible {
    outline: 3px solid #2563eb;
    outline-offset: 2px;
    border-radius: 3px;
  }

  /* ── Skip-to-content link ── */
  .skip-link {
    position: absolute;
    top: -100%;
    left: 8px;
    padding: 8px 16px;
    background: #1e40af;
    color: #fff;
    font-weight: 700;
    border-radius: 0 0 6px 6px;
    z-index: 9999;
    transition: top 0.15s;
  }
  .skip-link:focus { top: 0; }

  /* ── Reduced-motion: disable all animations for users who prefer it ── */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
  }

  /* ── Carousel slide transition ── */
  .slide-track {
    display: flex;
    transition: transform 0.35s ease;
  }
  @media (prefers-reduced-motion: reduce) {
    .slide-track { transition: none; }
  }

  /* ── Listbox dropdown ── */
  .listbox-options {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: #fff;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 50;
    max-height: 240px;
    overflow-y: auto;
  }
  .listbox-option[aria-selected="true"] { background: #eff6ff; }
  .listbox-option[data-active="true"] { background: #dbeafe; }

  /* ── Load-more button (infinite-scroll alternative) ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid currentColor;
    border-top-color: transparent;
    border-radius: 50%;
    display: inline-block;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  /* ── High-contrast / forced-colors support ── */
  @media (forced-colors: active) {
    .badge { border: 1px solid ButtonText; }
    .tab-item[aria-selected="true"] { border-bottom: 3px solid ButtonText; }
  }

  /* ── Print: hide interactive controls ── */
  @media print {
    .no-print { display: none !important; }
    body { color: #000; background: #fff; }
  }
</style>
</head>
<body class="bg-slate-50 text-slate-900">

<!-- ── Skip-to-content: first focusable element on page ── -->
<a class="skip-link" href="#main-content">Skip to main content</a>

<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback, useId, useMemo } = React;

/* ======================================================================
   DESIGN TOKENS
   ====================================================================== */
const TOKEN = {
  primary:   { bg: 'bg-blue-600',  hover: 'hover:bg-blue-700',  text: 'text-white',        ring: 'focus-visible:ring-blue-500'  },
  secondary: { bg: 'bg-slate-100', hover: 'hover:bg-slate-200', text: 'text-slate-700',    ring: 'focus-visible:ring-slate-400' },
  success:   { bg: 'bg-emerald-600', hover: 'hover:bg-emerald-700', text: 'text-white',    ring: 'focus-visible:ring-emerald-500' },
  warning:   { bg: 'bg-amber-500',  hover: 'hover:bg-amber-600',  text: 'text-white',      ring: 'focus-visible:ring-amber-500'  },
  danger:    { bg: 'bg-red-600',    hover: 'hover:bg-red-700',    text: 'text-white',      ring: 'focus-visible:ring-red-500'    },
};

/* ======================================================================
   SECTION HEADER
   ====================================================================== */
function SectionHeader({ title, badge, children }) {
  return (
    <div className="mb-4">
      <div className="flex items-center gap-3 mb-1">
        <h2 className="text-xl font-bold text-slate-800">{title}</h2>
        {badge && (
          <span className="badge text-xs font-semibold px-2 py-0.5 rounded-full bg-blue-100 text-blue-700 border border-blue-200">
            {badge}
          </span>
        )}
      </div>
      {children && <p className="text-sm text-slate-500">{children}</p>}
    </div>
  );
}

/* ======================================================================
   PATTERN 1: ACCESSIBLE CAROUSEL
   Problem: Auto-advancing carousels cause cognitive overload, motion
   sickness, and keyboard traps. Screen readers cannot track rapid changes.

   Solution:
   - Role="region" with aria-label
   - ARIA live region (aria-live="polite") announces slide changes
   - Pause/play control (required by WCAG 2.2 SC 2.2.2)
   - Roving tabindex with arrow-key navigation
   - All slides visible without JS (progressive enhancement)
   - No autoplay by default; user must opt in
   ====================================================================== */
const SLIDES = [
  { id: 1, title: 'Purchase Order Created',     description: 'PO-2026-001 for 100 KG Aluminum Sheet @ $5.00/KG from Summit Aluminum Supply.', status: 'complete' },
  { id: 2, title: 'Goods Receipt Posted',        description: 'Movement type 101. Inventory increased by 100 KG. PPV of $50.00 posted to variance account.', status: 'complete' },
  { id: 3, title: 'Invoice Verification Done',   description: 'Vendor invoice matched to PO. Accounts Payable balance: $500.00.', status: 'pending' },
  { id: 4, title: 'Payment Processed',           description: 'F53 outgoing payment. AP cleared. Bank account reduced by $500.00.', status: 'pending' },
];

function AccessibleCarousel() {
  const [current, setCurrent] = useState(0);
  const [playing, setPlaying] = useState(false);
  const announcerRef = useRef(null);
  const intervalRef  = useRef(null);
  const slidesRef    = useRef([]);
  const id = useId();

  const go = useCallback((idx) => {
    const next = (idx + SLIDES.length) % SLIDES.length;
    setCurrent(next);
    // Announce to screen readers without moving focus
    if (announcerRef.current) {
      announcerRef.current.textContent = '';
      requestAnimationFrame(() => {
        if (announcerRef.current)
          announcerRef.current.textContent =
            `Slide ${next + 1} of ${SLIDES.length}: ${SLIDES[next].title}`;
      });
    }
  }, []);

  // Autoplay
  useEffect(() => {
    if (playing) {
      intervalRef.current = setInterval(() => go(current + 1), 4000);
    }
    return () => clearInterval(intervalRef.current);
  }, [playing, current, go]);

  // Pause on hover / focus
  const pause  = () => setPlaying(false);

  const onKeyDown = (e) => {
    if (e.key === 'ArrowLeft')  { e.preventDefault(); go(current - 1); }
    if (e.key === 'ArrowRight') { e.preventDefault(); go(current + 1); }
    if (e.key === 'Home')       { e.preventDefault(); go(0); }
    if (e.key === 'End')        { e.preventDefault(); go(SLIDES.length - 1); }
  };

  return (
    <div>
      <SectionHeader title="1. Accessible Carousel" badge="WCAG 2.2 AA">
        Replaces auto-advancing carousels. No motion without user consent. Full
        keyboard control. Live-region announcements for screen readers. Pause/play
        control satisfies SC 2.2.2.
      </SectionHeader>

      {/* Hidden live region — announces slide changes to AT */}
      <div
        ref={announcerRef}
        aria-live="polite"
        aria-atomic="true"
        className="sr-only"
      />

      <div
        role="region"
        aria-label="Process Step Carousel"
        aria-roledescription="carousel"
        onMouseEnter={pause}
        onFocus={pause}
        className="relative overflow-hidden rounded-xl border border-slate-200 bg-white shadow-sm"
      >
        {/* Slide track */}
        <div
          className="slide-track"
          style={{ transform: `translateX(-${current * 100}%)` }}
          aria-live="off"
        >
          {SLIDES.map((slide, i) => (
            <div
              key={slide.id}
              ref={el => slidesRef.current[i] = el}
              role="group"
              aria-roledescription="slide"
              aria-label={`${i + 1} of ${SLIDES.length}: ${slide.title}`}
              aria-hidden={i !== current}
              tabIndex={i === current ? 0 : -1}
              className="min-w-full p-8 flex flex-col gap-3"
            >
              <div className="flex items-center gap-3">
                <span className={`inline-flex items-center justify-center w-8 h-8 rounded-full text-sm font-bold
                  ${slide.status === 'complete' ? 'bg-emerald-100 text-emerald-700' : 'bg-slate-100 text-slate-500'}`}
                  aria-hidden="true"
                >
                  {slide.status === 'complete' ? '✓' : i + 1}
                </span>
                <h3 className="text-lg font-semibold text-slate-800">{slide.title}</h3>
              </div>
              <p className="text-slate-600 text-sm leading-relaxed">{slide.description}</p>
            </div>
          ))}
        </div>

        {/* Controls row */}
        <div className="flex items-center justify-between px-6 py-3 border-t border-slate-100 bg-slate-50">
          {/* Prev/Next */}
          <div className="flex gap-2">
            <button
              onClick={() => go(current - 1)}
              onKeyDown={onKeyDown}
              aria-label="Previous slide"
              className="p-2 rounded-lg text-slate-600 hover:bg-slate-200 focus-visible:ring-2 focus-visible:ring-blue-500 transition-colors"
            >
              ←
            </button>
            <button
              onClick={() => go(current + 1)}
              onKeyDown={onKeyDown}
              aria-label="Next slide"
              className="p-2 rounded-lg text-slate-600 hover:bg-slate-200 focus-visible:ring-2 focus-visible:ring-blue-500 transition-colors"
            >
              →
            </button>
          </div>

          {/* Dot indicators with accessible labels */}
          <div role="tablist" aria-label="Choose slide" className="flex gap-2">
            {SLIDES.map((slide, i) => (
              <button
                key={slide.id}
                role="tab"
                aria-selected={i === current}
                aria-label={`Slide ${i + 1}: ${slide.title}`}
                onClick={() => go(i)}
                className={`w-2.5 h-2.5 rounded-full transition-all focus-visible:ring-2 focus-visible:ring-blue-500
                  ${i === current ? 'bg-blue-600 w-6' : 'bg-slate-300 hover:bg-slate-400'}`}
              />
            ))}
          </div>

          {/* Pause/Play — required by WCAG SC 2.2.2 */}
          <button
            onClick={() => setPlaying(p => !p)}
            aria-label={playing ? 'Pause auto-advance' : 'Play auto-advance'}
            aria-pressed={playing}
            className="px-3 py-1.5 text-xs font-semibold rounded-lg bg-slate-200 text-slate-600
              hover:bg-slate-300 focus-visible:ring-2 focus-visible:ring-blue-500 transition-colors"
          >
            {playing ? '⏸ Pause' : '▶ Play'}
          </button>
        </div>
      </div>

      {/* Keyboard instructions — visible on focus or hover */}
      <p className="mt-2 text-xs text-slate-400">
        Keyboard: ← → navigate slides · Home / End jump to first/last
      </p>
    </div>
  );
}

/* ======================================================================
   PATTERN 2: LOAD-MORE (INFINITE SCROLL ALTERNATIVE)
   Problem: Infinite scroll removes user control, breaks the back button,
   prevents reaching the footer, and disorients screen reader users who
   lose context when new content appears mid-list.

   Solution:
   - Explicit "Load more" button — users choose when to load
   - aria-live="polite" announces how many new items appeared
   - Optional IntersectionObserver mode that users can enable explicitly
   - Preserves scroll position and focus on load
   - Shows item count and total for orientation
   ====================================================================== */
const ALL_ITEMS = Array.from({ length: 48 }, (_, i) => ({
  id: i + 1,
  doc:  `JE-2026-${String(i + 1).padStart(4, '0')}`,
  desc: [
    'Goods Receipt — RM001 100KG',
    'Invoice Verification — V001',
    'Outgoing Payment — V001',
    'Production Order — SF001 20EA',
    'Goods Issue to Production — 261',
    'Production Confirmation — SF001',
    'Semi-Finished GR — SF001',
    'Finished Goods GR — FG001',
    'Sales Order — FG001 5EA',
    'Goods Issue — VL01N',
    'Billing — VF01',
    'Incoming Payment — C001',
  ][i % 12],
  amount: `$${(Math.random() * 5000 + 100).toFixed(2)}`,
  module: ['MM','MM','MM','PP','PP','PP','PP','PP','SD','SD','SD','SD'][i % 12],
}));

const PAGE_SIZE = 8;

function LoadMore() {
  const [loaded, setLoaded] = useState(PAGE_SIZE);
  const [loading, setLoading] = useState(false);
  const announcerRef = useRef(null);
  const lastNewRef   = useRef(null);

  const items = ALL_ITEMS.slice(0, loaded);
  const remaining = ALL_ITEMS.length - loaded;
  const toLoad = Math.min(PAGE_SIZE, remaining);

  const loadMore = async () => {
    setLoading(true);
    // Simulate network latency
    await new Promise(r => setTimeout(r, 600));
    const nextLoaded = loaded + PAGE_SIZE;
    setLoaded(nextLoaded);
    setLoading(false);

    if (announcerRef.current) {
      announcerRef.current.textContent = '';
      requestAnimationFrame(() => {
        if (announcerRef.current)
          announcerRef.current.textContent =
            `${toLoad} more items loaded. Showing ${Math.min(nextLoaded, ALL_ITEMS.length)} of ${ALL_ITEMS.length} entries.`;
      });
    }
    // Move focus to first new item for keyboard users
    requestAnimationFrame(() => {
      if (lastNewRef.current) lastNewRef.current.focus();
    });
  };

  return (
    <div>
      <SectionHeader title="2. Paginated Load-More" badge="WCAG 2.2 AA">
        Replaces infinite scroll. Users control when to load more. Screen readers
        hear an announcement. Focus moves to first new item so keyboard users
        don't have to re-navigate. Shows count for orientation.
      </SectionHeader>

      {/* Live announcer */}
      <div ref={announcerRef} aria-live="polite" aria-atomic="true" className="sr-only" />

      <div className="border border-slate-200 rounded-xl bg-white shadow-sm overflow-hidden">
        {/* Summary bar */}
        <div className="px-4 py-3 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
          <span className="text-sm font-medium text-slate-600">
            Showing <strong className="text-slate-800">{items.length}</strong> of{' '}
            <strong className="text-slate-800">{ALL_ITEMS.length}</strong> journal entries
          </span>
          <span className="text-xs text-slate-400" aria-hidden="true">
            Page {Math.ceil(loaded / PAGE_SIZE)} of {Math.ceil(ALL_ITEMS.length / PAGE_SIZE)}
          </span>
        </div>

        {/* Table with semantic markup */}
        <div className="overflow-x-auto" tabIndex={0} aria-label="Journal entries table, scrollable">
          <table className="w-full text-sm" aria-label="Journal Entries">
            <thead>
              <tr className="border-b border-slate-200 bg-slate-50 text-left">
                <th scope="col" className="px-4 py-3 font-semibold text-slate-600 text-xs uppercase tracking-wide">Document</th>
                <th scope="col" className="px-4 py-3 font-semibold text-slate-600 text-xs uppercase tracking-wide">Module</th>
                <th scope="col" className="px-4 py-3 font-semibold text-slate-600 text-xs uppercase tracking-wide">Description</th>
                <th scope="col" className="px-4 py-3 font-semibold text-slate-600 text-xs uppercase tracking-wide text-right">Amount</th>
              </tr>
            </thead>
            <tbody>
              {items.map((item, i) => {
                const isFirstNew = i === loaded - toLoad && loaded > PAGE_SIZE;
                return (
                  <tr
                    key={item.id}
                    ref={isFirstNew ? lastNewRef : null}
                    tabIndex={isFirstNew ? -1 : undefined}
                    className="border-b border-slate-100 hover:bg-slate-50 transition-colors"
                  >
                    <td className="px-4 py-3 font-mono text-slate-700">{item.doc}</td>
                    <td className="px-4 py-3">
                      <span className={`text-xs font-semibold px-2 py-0.5 rounded-full
                        ${item.module === 'MM' ? 'bg-blue-100 text-blue-700' :
                          item.module === 'PP' ? 'bg-emerald-100 text-emerald-700' :
                          'bg-amber-100 text-amber-700'}`}>
                        {item.module}
                      </span>
                    </td>
                    <td className="px-4 py-3 text-slate-600">{item.desc}</td>
                    <td className="px-4 py-3 text-right font-mono text-slate-800">{item.amount}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Load-more footer */}
        <div className="px-4 py-4 border-t border-slate-100 flex flex-col sm:flex-row items-center gap-3">
          {remaining > 0 ? (
            <>
              <button
                onClick={loadMore}
                disabled={loading}
                aria-disabled={loading}
                aria-label={`Load ${toLoad} more journal entries (${remaining} remaining)`}
                className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed
                  text-white text-sm font-semibold rounded-lg transition-colors
                  focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-blue-500"
              >
                {loading ? (
                  <><span className="spinner" aria-hidden="true" />Loading…</>
                ) : (
                  `Load ${toLoad} more`
                )}
              </button>
              <span className="text-sm text-slate-500">
                {remaining} more {remaining === 1 ? 'entry' : 'entries'} available
              </span>
            </>
          ) : (
            <p className="text-sm text-slate-500" role="status">
              All {ALL_ITEMS.length} entries loaded.
            </p>
          )}
        </div>
      </div>
    </div>
  );
}

/* ======================================================================
   PATTERN 3: ACCESSIBLE COMBOBOX (COMPLEX DROPDOWN ALTERNATIVE)
   Problem: Native <select> is unstyled, lacks search, and can't show rich
   content. Custom dropdowns built with onClick+div are keyboard traps:
   no arrow navigation, no typeahead, no escape-to-close, no screen-reader
   role announcements.

   Solution:
   - ARIA combobox pattern (WAI-ARIA 1.2 listbox)
   - role="combobox" + aria-controls + aria-activedescendant
   - Keyboard: ↓↑ navigate, Enter select, Escape close, Home/End jump
   - Type-to-filter search built in
   - aria-selected on options, aria-live for selection announcements
   - Works without JS: falls back to native <select> (progressive enhancement)
   ====================================================================== */
const MATERIALS = [
  { code: 'RM001', label: 'RM001 — Aluminum Sheet',      type: 'RM', price: '$5.50/KG' },
  { code: 'RM002', label: 'RM002 — Steel Rod',            type: 'RM', price: '$3.20/KG' },
  { code: 'SF001', label: 'SF001 — Bracket Frame',        type: 'SF', price: '$18.00/EA' },
  { code: 'FG001', label: 'FG001 — Engine Mount Bracket', type: 'FG', price: '$45.00/EA' },
  { code: 'PKG01', label: 'PKG01 — Cardboard Box',        type: 'PK', price: '$0.80/EA' },
  { code: 'LBL01', label: 'LBL01 — Product Label',        type: 'PK', price: '$0.05/EA' },
];

function AccessibleCombobox({ label, id: externalId, onChange }) {
  const [open,    setOpen   ] = useState(false);
  const [query,   setQuery  ] = useState('');
  const [active,  setActive ] = useState(-1);
  const [selected, setSelected] = useState(null);
  const inputRef   = useRef(null);
  const listRef    = useRef(null);
  const announcerRef = useRef(null);
  const listboxId  = `${externalId}-listbox`;

  const filtered = useMemo(() =>
    MATERIALS.filter(m =>
      m.label.toLowerCase().includes(query.toLowerCase()) ||
      m.type.toLowerCase().includes(query.toLowerCase())
    ), [query]);

  const select = (item) => {
    setSelected(item);
    setQuery(item.label);
    setOpen(false);
    setActive(-1);
    onChange?.(item);
    if (announcerRef.current)
      announcerRef.current.textContent = `${item.label} selected`;
    inputRef.current?.focus();
  };

  const onInputKeyDown = (e) => {
    if (!open && (e.key === 'ArrowDown' || e.key === 'Enter')) {
      setOpen(true);
      setActive(0);
      e.preventDefault();
      return;
    }
    if (!open) return;

    switch (e.key) {
      case 'ArrowDown':
        e.preventDefault();
        setActive(a => Math.min(a + 1, filtered.length - 1));
        break;
      case 'ArrowUp':
        e.preventDefault();
        setActive(a => Math.max(a - 1, 0));
        break;
      case 'Home':
        e.preventDefault();
        setActive(0);
        break;
      case 'End':
        e.preventDefault();
        setActive(filtered.length - 1);
        break;
      case 'Enter':
        e.preventDefault();
        if (active >= 0 && filtered[active]) select(filtered[active]);
        break;
      case 'Escape':
        e.preventDefault();
        setOpen(false);
        setActive(-1);
        break;
      case 'Tab':
        setOpen(false);
        break;
    }
  };

  // Scroll active option into view
  useEffect(() => {
    if (!listRef.current || active < 0) return;
    const el = listRef.current.querySelector(`[data-idx="${active}"]`);
    el?.scrollIntoView({ block: 'nearest' });
  }, [active]);

  const activeDescendantId = active >= 0 ? `${externalId}-opt-${active}` : undefined;

  return (
    <div className="relative">
      <div ref={announcerRef} aria-live="assertive" aria-atomic="true" className="sr-only" />

      <label htmlFor={externalId} className="block text-sm font-medium text-slate-700 mb-1">
        {label}
      </label>

      {/* Combobox input */}
      <div className="relative">
        <input
          ref={inputRef}
          id={externalId}
          type="text"
          role="combobox"
          aria-label={label}
          aria-expanded={open}
          aria-controls={listboxId}
          aria-autocomplete="list"
          aria-activedescendant={activeDescendantId}
          aria-haspopup="listbox"
          value={query}
          placeholder="Search or select a material…"
          onChange={e => { setQuery(e.target.value); setOpen(true); setActive(0); }}
          onKeyDown={onInputKeyDown}
          onFocus={() => { if (!open) setOpen(true); }}
          onBlur={() => setTimeout(() => setOpen(false), 150)}
          className="w-full px-3 py-2.5 pr-10 rounded-lg border border-slate-300
            focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
            text-sm text-slate-800 bg-white"
          autoComplete="off"
          spellCheck={false}
        />
        {/* Chevron toggle — decorative, aria-hidden */}
        <button
          tabIndex={-1}
          aria-hidden="true"
          onClick={() => { setOpen(o => !o); inputRef.current?.focus(); }}
          className="absolute right-2.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-auto"
        >
          {open ? '▲' : '▼'}
        </button>
      </div>

      {/* Listbox */}
      {open && (
        <ul
          ref={listRef}
          id={listboxId}
          role="listbox"
          aria-label={`${label} options`}
          className="listbox-options"
        >
          {filtered.length === 0 && (
            <li className="px-3 py-3 text-sm text-slate-400 text-center" role="option" aria-disabled="true">
              No materials match "{query}"
            </li>
          )}
          {filtered.map((item, i) => (
            <li
              key={item.code}
              id={`${externalId}-opt-${i}`}
              data-idx={i}
              role="option"
              aria-selected={selected?.code === item.code}
              data-active={i === active}
              onMouseDown={() => select(item)}
              onMouseEnter={() => setActive(i)}
              className="listbox-option px-3 py-2.5 cursor-pointer hover:bg-blue-50
                flex items-center justify-between gap-3 text-sm transition-colors"

/* ======================================================================
   PATTERN 4: ACCESSIBLE TABS
   Problem: Div-based tab systems break keyboard navigation. Arrow keys
   don't work. Screen readers don't know which panel is active. Focus
   jumps unpredictably.

   Solution:
   - role="tablist" / role="tab" / role="tabpanel"
   - Roving tabindex (only active tab in tab order)
   - Arrow keys move focus within the tablist
   - aria-selected + aria-controls + aria-labelledby wiring
   ====================================================================== */
const TABS_DATA = [
  { id: 'tab-mm',   label: 'MM Purchase', content: 'Purchase orders, goods receipts, invoice verification, and payment processing for raw material procurement.' },
  { id: 'tab-pp',   label: 'PP Production', content: 'Production orders, goods issue to production, production confirmation, and goods receipt for finished goods.' },
  { id: 'tab-fico', label: 'FI/CO Costing', content: 'Material ledger settlement, activity price revaluation, single-level and multi-level cost rollup, and post-closing entries.' },
  { id: 'tab-sd',   label: 'SD Sales', content: 'Sales orders, outbound deliveries, billing documents, and incoming payment processing for customer sales.' },
];

function AccessibleTabs() {
  const [activeTab, setActiveTab] = useState(TABS_DATA[0].id);
  const tabRefs = useRef({});

  const onTabKeyDown = (e, tabId) => {
    const idx = TABS_DATA.findIndex(t => t.id === tabId);
    let next = -1;
    if (e.key === 'ArrowRight') next = (idx + 1) % TABS_DATA.length;
    if (e.key === 'ArrowLeft')  next = (idx - 1 + TABS_DATA.length) % TABS_DATA.length;
    if (e.key === 'Home')       next = 0;
    if (e.key === 'End')        next = TABS_DATA.length - 1;

    if (next !== -1) {
      e.preventDefault();
      const nextTab = TABS_DATA[next];
      setActiveTab(nextTab.id);
      tabRefs.current[nextTab.id]?.focus();
    }
  };

  const activeData = TABS_DATA.find(t => t.id === activeTab);

  return (
    <div>
      <SectionHeader title="4. Accessible Tabs" badge="WAI-ARIA 1.2">
        Roving tabindex so only the active tab is in the tab order. Arrow keys
        move focus between tabs. Panel has focus management and aria-labelledby.
      </SectionHeader>

      <div className="border border-slate-200 rounded-xl bg-white shadow-sm overflow-hidden">
        {/* Tablist */}
        <div role="tablist" aria-label="ERP Process Modules" className="flex border-b border-slate-200 bg-slate-50 overflow-x-auto">
          {TABS_DATA.map(tab => (
            <button
              key={tab.id}
              ref={el => tabRefs.current[tab.id] = el}
              id={tab.id}
              role="tab"
              aria-selected={tab.id === activeTab}
              aria-controls={`panel-${tab.id}`}
              tabIndex={tab.id === activeTab ? 0 : -1}
              onClick={() => setActiveTab(tab.id)}
              onKeyDown={e => onTabKeyDown(e, tab.id)}
              className={`tab-item flex-shrink-0 px-5 py-3 text-sm font-medium transition-colors
                focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-blue-500
                ${tab.id === activeTab
                  ? 'text-blue-600 border-b-2 border-blue-600 -mb-px bg-white'
                  : 'text-slate-500 hover:text-slate-700 hover:bg-slate-100'}`}
            >
              {tab.label}
            </button>
          ))}
        </div>

        {/* Tab panels */}
        {TABS_DATA.map(tab => (
          <div
            key={tab.id}
            id={`panel-${tab.id}`}
            role="tabpanel"
            aria-labelledby={tab.id}
            hidden={tab.id !== activeTab}
            tabIndex={0}
            className="p-6 text-sm text-slate-600 leading-relaxed focus:outline-none
              focus-visible:ring-2 focus-visible:ring-inset focus-visible:ring-blue-400"
          >
            <h3 className="text-base font-semibold text-slate-800 mb-2">{tab.label}</h3>
            <p>{tab.content}</p>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ======================================================================
   PATTERN 5: ACCESSIBLE MODAL / DIALOG
   Problem: Div-based modals don't trap focus, don't restore focus on
   close, don't announce to screen readers, and don't close on Escape.
   Background content remains accessible to AT when it should be inert.

   Solution:
   - role="dialog" + aria-modal="true" + aria-labelledby + aria-describedby
   - Focus trap: Tab/Shift-Tab cycle within dialog only
   - Escape closes
   - Focus returns to trigger on close
   - aria-hidden on background when open (via inert attribute)
   ====================================================================== */
const FOCUSABLE = 'a[href], button:not([disabled]), input:not([disabled]), select:not([disabled]), textarea:not([disabled]), [tabindex]:not([tabindex="-1"])';

function useFocusTrap(ref, active) {
  useEffect(() => {
    if (!active || !ref.current) return;
    const el = ref.current;
    const first = () => el.querySelectorAll(FOCUSABLE)[0];
    const last  = () => { const all = el.querySelectorAll(FOCUSABLE); return all[all.length - 1]; };

    const onKeyDown = (e) => {
      if (e.key !== 'Tab') return;
      if (e.shiftKey) {
        if (document.activeElement === first()) { e.preventDefault(); last()?.focus(); }
      } else {
        if (document.activeElement === last())  { e.preventDefault(); first()?.focus(); }
      }
    };
    el.addEventListener('keydown', onKeyDown);
    first()?.focus();
    return () => el.removeEventListener('keydown', onKeyDown);
  }, [active, ref]);
}

function AccessibleModal() {
  const [open, setOpen] = useState(false);
  const triggerRef = useRef(null);
  const dialogRef  = useRef(null);
  useFocusTrap(dialogRef, open);

  const close = () => {
    setOpen(false);
    // Restore focus to trigger
    requestAnimationFrame(() => triggerRef.current?.focus());
  };

  // Escape key
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') close(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open]);

  return (
    <div>
      <SectionHeader title="5. Accessible Modal Dialog" badge="WAI-ARIA 1.2">
        Focus trap · Escape-to-close · focus-restore · aria-modal · background
        inert (inaccessible to screen readers while dialog is open).
      </SectionHeader>

      <div className="border border-slate-200 rounded-xl bg-white shadow-sm p-6 flex items-center gap-4">
        <button
          ref={triggerRef}
          onClick={() => setOpen(true)}
          className="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold
            rounded-lg transition-colors focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-blue-500"
          aria-haspopup="dialog"
        >
          Open confirmation dialog
        </button>
        <p className="text-sm text-slate-500">Opens a dialog with focus trap and keyboard controls.</p>
      </div>

      {/* Backdrop + Dialog */}
      {open && (
        <div
          className="fixed inset-0 z-50 flex items-center justify-center p-4"
          style={{ background: 'rgba(15,23,42,0.5)' }}
          onClick={e => { if (e.target === e.currentTarget) close(); }}
          aria-hidden="false"
        >
          <div
            ref={dialogRef}
            role="dialog"
            aria-modal="true"
            aria-labelledby="dialog-title"
            aria-describedby="dialog-desc"
            className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 relative"
          >
            <h2 id="dialog-title" className="text-lg font-bold text-slate-800 mb-2 pr-8">
              Confirm Production Order
            </h2>
            <p id="dialog-desc" className="text-sm text-slate-600 mb-6 leading-relaxed">
              You are about to create production order <strong>PP-2026-0042</strong> for{' '}
              <strong>SF001 — Bracket Frame × 20 EA</strong>. This will consume 60 KG of RM001
              and 20 KG of RM002 from inventory.
            </p>
            <div className="flex gap-3 justify-end">
              <button
                onClick={close}
                className="px-4 py-2 text-sm font-medium text-slate-600 bg-slate-100 rounded-lg
                  hover:bg-slate-200 transition-colors focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-slate-400"
              >
                Cancel
              </button>
              <button
                onClick={close}
                className="px-4 py-2 text-sm font-semibold text-white bg-emerald-600 rounded-lg
                  hover:bg-emerald-700 transition-colors focus-visible:ring-2 focus-visible:ring-offset-2 focus-visible:ring-emerald-500"
              >
                Create Order
              </button>
            </div>

            {/* Close X — keyboard accessible */}
            <button
              onClick={close}
              aria-label="Close dialog"
              className="absolute top-4 right-4 p-1.5 rounded-lg text-slate-400 hover:text-slate-600
                hover:bg-slate-100 transition-colors focus-visible:ring-2 focus-visible:ring-blue-500"
            >
              ✕
            </button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ======================================================================
   PATTERN 6: ACCESSIBLE DATA TABLE
   Problem: Tables without scope, caption, or sortable column headers are
   meaningless to screen readers. Zebra stripes alone don't communicate
   sort state or row selection.

   Solution:
   - <caption> for table description
   - scope="col" / scope="row"
   - aria-sort on sortable headers (ascending/descending/none)
   - aria-rowcount + aria-rowindex for virtual tables
   - Keyboard sortable with Enter/Space on column headers
   ====================================================================== */
const TABLE_DATA = [
  { doc: 'JE-001', module: 'MM', description: 'Goods Receipt RM001', debit: 550.00, credit: 500.00 },
  { doc: 'JE-002', module: 'MM', description: 'Purchase Price Variance', debit: 0,      credit: 50.00  },
  { doc: 'JE-003', module: 'PP', description: 'Goods Issue to Production', debit: 293.00, credit: 293.00 },
  { doc: 'JE-004', module: 'PP', description: 'Production Confirmation Labor', debit: 293.50, credit: 293.50 },
  { doc: 'JE-005', module: 'SD', description: 'Billing — FG001 5EA', debit: 750.00, credit: 750.00 },
];

function AccessibleTable() {
  const [sortCol, setSortCol] = useState('doc');
  const [sortDir, setSortDir] = useState('ascending');

  const toggleSort = (col) => {
    if (sortCol === col) {
      setSortDir(d => d === 'ascending' ? 'descending' : 'ascending');
    } else {
      setSortCol(col);
      setSortDir('ascending');
    }
  };

  const sorted = useMemo(() => {
    return [...TABLE_DATA].sort((a, b) => {
      const av = a[sortCol], bv = b[sortCol];
      const cmp = typeof av === 'string' ? av.localeCompare(bv) : av - bv;
      return sortDir === 'ascending' ? cmp : -cmp;
    });
  }, [sortCol, sortDir]);

  const cols = [
    { key: 'doc',         label: 'Document',    sortable: true  },
    { key: 'module',      label: 'Module',       sortable: true  },
    { key: 'description', label: 'Description',  sortable: false },
    { key: 'debit',       label: 'Debit ($)',     sortable: true  },
    { key: 'credit',      label: 'Credit ($)',    sortable: true  },
  ];

  return (
    <div>
      <SectionHeader title="6. Accessible Data Table" badge="WCAG 1.3.1">
        Semantic table with caption, column scope, and sortable headers.
        aria-sort state communicated to screen readers. Keyboard-sortable.
      </SectionHeader>

      <div className="border border-slate-200 rounded-xl bg-white shadow-sm overflow-hidden">
        <div className="overflow-x-auto" tabIndex={0} aria-label="Journal entries, sortable table, scrollable horizontally">
          <table className="w-full text-sm" aria-rowcount={sorted.length + 1}>
            <caption className="sr-only">
              Journal Entries — sorted by {sortCol} {sortDir}. Use column header buttons to change sort.
            </caption>
            <thead>
              <tr className="bg-slate-50 border-b border-slate-200">
                {cols.map(col => (
                  <th
                    key={col.key}
                    scope="col"
                    aria-sort={col.sortable ? (sortCol === col.key ? sortDir : 'none') : undefined}
                    className={`px-4 py-3 text-left ${col.sortable ? 'cursor-pointer select-none' : ''}`}
                  >
                    {col.sortable ? (
                      <button
                        onClick={() => toggleSort(col.key)}
                        className={`flex items-center gap-1.5 text-xs font-semibold uppercase tracking-wide
                          focus-visible:ring-2 focus-visible:ring-blue-500 rounded
                          ${sortCol === col.key ? 'text-blue-600' : 'text-slate-500 hover:text-slate-700'}`}
                      >
                        {col.label}
                        <span aria-hidden="true" className="text-slate-300">
                          {sortCol === col.key
                            ? (sortDir === 'ascending' ? '↑' : '↓')
                            : '↕'}
                        </span>
                      </button>
                    ) : (
                      <span className="text-xs font-semibold uppercase tracking-wide text-slate-500">
                        {col.label}
                      </span>
                    )}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {sorted.map((row, i) => (
                <tr
                  key={row.doc}
                  aria-rowindex={i + 2}
                  className="border-b border-slate-100 hover:bg-slate-50 transition-colors"
                >
                  <td scope="row" className="px-4 py-3 font-mono font-medium text-slate-700">{row.doc}</td>
                  <td className="px-4 py-3">
                    <span className={`text-xs font-bold px-1.5 py-0.5 rounded
                      ${row.module === 'MM' ? 'bg-blue-100 text-blue-700' :
                        row.module === 'PP' ? 'bg-emerald-100 text-emerald-700' :
                        'bg-amber-100 text-amber-700'}`}>
                      {row.module}
                    </span>
                  </td>
                  <td className="px-4 py-3 text-slate-600">{row.description}</td>
                  <td className="px-4 py-3 text-right font-mono text-slate-800">
                    {row.debit > 0 ? `$${row.debit.toFixed(2)}` : '—'}
                  </td>
                  <td className="px-4 py-3 text-right font-mono text-slate-800">
                    {row.credit > 0 ? `$${row.credit.toFixed(2)}` : '—'}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ======================================================================
   PATTERN 7: PROGRESSIVE ENHANCEMENT — STATUS NOTIFICATIONS
   Problem: Status toasts/alerts using setTimeout and opacity don't
   announce to screen readers. Visual-only color indicators (red/green)
   fail WCAG 1.4.1 (Use of Color).

   Solution:
   - role="alert" for critical messages (interrupts AT immediately)
   - role="status" for low-priority (polite queue)
   - Always pair color with icon or text (never color alone)
   - Persistent enough for users with cognitive disabilities (≥5s)
   - Close button always present and keyboard accessible
   ====================================================================== */
const ALERT_TYPES = {
  success: { bg: 'bg-emerald-50', border: 'border-emerald-200', text: 'text-emerald-800', icon: '✓', iconBg: 'bg-emerald-100 text-emerald-600', role: 'status'  },
  warning: { bg: 'bg-amber-50',   border: 'border-amber-200',   text: 'text-amber-800',   icon: '!', iconBg: 'bg-amber-100 text-amber-600',   role: 'alert'   },
  error:   { bg: 'bg-red-50',     border: 'border-red-200',     text: 'text-red-800',     icon: '✕', iconBg: 'bg-red-100 text-red-600',       role: 'alert'   },
  info:    { bg: 'bg-blue-50',    border: 'border-blue-200',    text: 'text-blue-800',    icon: 'i', iconBg: 'bg-blue-100 text-blue-600',     role: 'status'  },
};

let _alertId = 0;

function ProgressiveNotifications() {
  const [alerts, setAlerts] = useState([]);

  const add = (type) => {
    const id = ++_alertId;
    const messages = {
      success: 'Goods Receipt posted successfully. Document JE-2026-0042 created.',
      warning: 'Stock below reorder point for RM001. Current: 20 KG, Minimum: 50 KG.',
      error:   'Invoice verification failed. PO amount $500.00 does not match invoice $540.00.',
      info:    'Standard cost cycle is running. Material ledger settlement in progress.',
    };
    setAlerts(a => [...a, { id, type, message: messages[type] }]);
    // Auto-dismiss non-errors after 8s
    if (type !== 'error') setTimeout(() => dismiss(id), 8000);
  };

  const dismiss = (id) => setAlerts(a => a.filter(x => x.id !== id));

  return (
    <div>
      <SectionHeader title="7. Accessible Status Notifications" badge="WCAG 1.4.1 + 4.1.3">
        role="alert" for urgent · role="status" for polite · icon + text (never
        color alone) · ≥5s display · keyboard-dismissible · auto-dismiss on
        non-errors.
      </SectionHeader>

      <div className="border border-slate-200 rounded-xl bg-white shadow-sm p-6">
        <div className="flex flex-wrap gap-2 mb-5">
          {['success','info','warning','error'].map(type => (
            <button
              key={type}
              onClick={() => add(type)}
              className={`px-4 py-2 text-sm font-semibold rounded-lg transition-colors
                focus-visible:ring-2 focus-visible:ring-offset-2
                ${type === 'success' ? 'bg-emerald-100 text-emerald-700 hover:bg-emerald-200 focus-visible:ring-emerald-500' :
                  type === 'info'    ? 'bg-blue-100 text-blue-700 hover:bg-blue-200 focus-visible:ring-blue-500' :
                  type === 'warning' ? 'bg-amber-100 text-amber-700 hover:bg-amber-200 focus-visible:ring-amber-500' :
                  'bg-red-100 text-red-700 hover:bg-red-200 focus-visible:ring-red-500'}`}
            >
              Show {type}
            </button>
          ))}
        </div>

        {/* Alert stack */}
        <div aria-label="Notifications" className="flex flex-col gap-2">
          {alerts.map(alert => {
            const cfg = ALERT_TYPES[alert.type];
            return (
              <div
                key={alert.id}
                role={cfg.role}
                aria-live={cfg.role === 'alert' ? 'assertive' : 'polite'}
                aria-atomic="true"
                className={`flex items-start gap-3 p-3.5 rounded-lg border ${cfg.bg} ${cfg.border}`}
              >
                <span
                  aria-hidden="true"
                  className={`flex-shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold ${cfg.iconBg}`}
                >
                  {cfg.icon}
                </span>
                <p className={`flex-1 text-sm leading-relaxed ${cfg.text}`}>{alert.message}</p>
                <button
                  onClick={() => dismiss(alert.id)}
                  aria-label="Dismiss notification"
                  className={`flex-shrink-0 p-1 rounded transition-colors ${cfg.text} opacity-60 hover:opacity-100
                    focus-visible:ring-2 focus-visible:ring-current`}
                >
                  ✕
                </button>
              </div>
            );
          })}
          {alerts.length === 0 && (
            <p className="text-sm text-slate-400 text-center py-4">
              No active notifications. Click a button above to trigger one.
            </p>
          )}
        </div>
      </div>
    </div>
  );
}

                  'Headings: correct h1→h6 hierarchy (one h1 per page)',
                  'Links describe destination; buttons describe action',
                  'Images: alt text (empty for decorative)',
                  'Language: lang="en" on <html>',
                ].map(t => (
                  <li key={t} className="flex gap-2">
                    <span className="text-emerald-500 font-bold flex-shrink-0">✓</span>
                    <span>{t}</span>
                  </li>
                ))}
              </ul>
            </div>
            <div>
              <h3 className="font-semibold text-slate-700 mb-2">Layer 2 — CSS Enhancement</h3>
              <ul className="space-y-1.5 text-slate-600 list-none">
                {[
                  ':focus-visible (never remove outline)',
                  'prefers-reduced-motion: disable all animations',
                  'prefers-color-scheme: dark mode',
                  'forced-colors (Windows High Contrast)',
                  'Minimum contrast ratio: 4.5:1 text, 3:1 UI components',
                  'Touch targets: ≥44×44px (WCAG 2.5.5)',
                  'Line height ≥1.5 for body, ≥1.2 for headings',
                  'max content width with legible measure (60–80ch)',
                ].map(t => (
                  <li key={t} className="flex gap-2">
                    <span className="text-blue-500 font-bold flex-shrink-0">✓</span>
                    <span>{t}</span>
                  </li>
                ))}
              </ul>
            </div>
            <div>
              <h3 className="font-semibold text-slate-700 mb-2">Layer 3 — JavaScript Enhancement</h3>
              <ul className="space-y-1.5 text-slate-600 list-none">
                {[
                  'Add ARIA roles/states only when native HTML cannot express them',
                  'aria-live regions for dynamic content updates',
                  'Focus management: trapping (modal), restoring (close), moving (load-more)',
                  'Keyboard patterns: roving tabindex (tabs/carousel), arrow keys (menus)',
                  'Never remove native focus indicators programmatically',
                  'Test with JS disabled: page must still be usable',
                  'Avoid mouseover-only interactions (hover ≠ focus for AT)',
                ].map(t => (
                  <li key={t} className="flex gap-2">
                    <span className="text-amber-500 font-bold flex-shrink-0">✓</span>
                    <span>{t}</span>
                  </li>
                ))}
              </ul>
            </div>
            <div>
              <h3 className="font-semibold text-slate-700 mb-2">Testing Checklist</h3>
              <ul className="space-y-1.5 text-slate-600 list-none">
                {[
                  'Tab through every interactive element in DOM order',
                  'Activate every widget with keyboard only (no mouse)',
                  'Test with NVDA + Firefox or VoiceOver + Safari',
                  'Zoom to 200%: no horizontal scroll, no truncation',
                  'Enable forced-colors in browser DevTools',
                  'Run axe-core or Lighthouse accessibility audit',
                  'Check color contrast with WebAIM Contrast Checker',
                  'Test at 320px viewport width (SC 1.4.10 Reflow)',
                ].map(t => (
                  <li key={t} className="flex gap-2">
                    <span className="text-slate-400 font-bold flex-shrink-0">→</span>
                    <span>{t}</span>
                  </li>
                ))}
              </ul>
            </div>
          </div>
        </section>

      </main>

      <footer className="border-t border-slate-200 bg-white mt-10 py-5 no-print">
        <div className="max-w-5xl mx-auto px-6 text-xs text-slate-400 text-center">
          Inclusive Design Patterns — WCAG 2.2 Level AA · WAI-ARIA 1.2 · Progressive Enhancement
        </div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
