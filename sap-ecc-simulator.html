/* =========================================================================
   STEP BUTTON
   ========================================================================= */
const StepButton = ({ steps, setSteps, stepKey, label, color='blue', journalData, onExecute, onCancel, openPopup, disabled=false, lang='ko' }) => {
  const colors = {
    blue:'bg-blue-500 hover:bg-blue-600', orange:'bg-orange-500 hover:bg-orange-600',
    indigo:'bg-indigo-500 hover:bg-indigo-600', teal:'bg-teal-500 hover:bg-teal-600',
    green:'bg-green-500 hover:bg-green-600', purple:'bg-purple-500 hover:bg-purple-600',
    red:'bg-red-500 hover:bg-red-600'
  };
  const done = !!steps[stepKey];
  const execute = () => {
    if (disabled) return;
    setSteps(prev => ({ ...prev, [stepKey]: true }));
    if (journalData) openPopup(journalData);
    onExecute?.();
  };
  const cancel = () => {
    const keys = Object.keys(steps);
    const idx = keys.indexOf(stepKey);
    setSteps(prev => {
      const next = { ...prev };
      keys.slice(idx).forEach(k => { next[k] = false; });
      return next;
    });
    onCancel?.();
  };
  return (
    <div className="flex gap-0.5 mb-1 items-center">
      <button onClick={execute} disabled={done || disabled}
        className={`flex items-center gap-1 px-3 py-1.5 rounded text-xs font-medium transition-all
          ${done ? 'bg-green-100 text-green-700 border border-green-300'
                 : disabled ? 'bg-slate-200 text-slate-400 cursor-not-allowed'
                 : `${colors[color]} text-white shadow-sm`}`}>
        {done ? '✓' : '▶'} {label}
      </button>
      {done && (
        <>
          {journalData && <button onClick={() => openPopup(journalData)}
            className="px-2 py-1 rounded text-xs bg-blue-100 text-blue-600 hover:bg-blue-200">{T[lang].journalBtn}</button>}
          <button onClick={cancel} className="px-2 py-1 rounded text-xs bg-red-100 text-red-600 hover:bg-red-200">↺</button>
        </>
      )}
    </div>
  );
};

/* =========================================================================
   BOM TREE
   ========================================================================= */
const BOMTree = ({ materials, lang='ko' }) => {
  const roots = materials.filter(m => String(m.BOMLevel) === '0');
  const getChildren = (parentCode, level) =>
    materials.filter(m => m.ParentMaterial === parentCode && String(m.BOMLevel) === String(level));
  const typeColor = { FERT:'bg-blue-100 text-blue-800', HALB:'bg-orange-100 text-orange-800', ROH:'bg-green-100 text-green-800' };

  const BOMNode = ({ mat, depth=0 }) => {
    const children = getChildren(mat.MaterialCode, parseInt(mat.BOMLevel)+1);
    return (
      <div>
        <div className="flex items-center gap-2 py-1" style={{ paddingLeft: depth*20 }}>
          {depth > 0 && <span className="text-gray-400 text-xs">└─</span>}
          <span className={`text-xs px-1.5 py-0.5 rounded font-mono ${typeColor[mat.MaterialType]||'bg-gray-100'}`}>
            {mat.MaterialType}
          </span>
          <span className="text-sm font-mono font-medium">{mat.MaterialCode}</span>
          <span className="text-xs text-gray-600">{mat.Description}</span>
          {mat.Quantity && <span className="text-xs text-gray-400">× {mat.Quantity} {mat.UOM}</span>}
          <span className="text-xs text-blue-600 ml-auto font-semibold">${parseFloat(mat.StandardPrice).toFixed(2)}</span>
        </div>
        {children.map((c,i) => <BOMNode key={i} mat={c} depth={depth+1} />)}
      </div>
    );
  };

  if (roots.length === 0) return <p className="text-gray-400 text-sm p-4">{lang==='ko'?'자재를 업로드하면 BOM 트리가 표시됩니다':'Upload materials to display the BOM tree'}</p>;
  return <div>{roots.map((r,i) => <BOMNode key={i} mat={r} />)}</div>;
};

/* =========================================================================
   CSV PARSER
   ========================================================================= */
function parseCSV(text) {
  const lines = text.replace(/\r/g,'').split('\n').filter(l => l.trim() !== '');
  if (lines.length < 2) throw new Error('CSV 데이터가 비어 있습니다');
  const header = lines[0].split(',').map(h => h.trim());
  const missing = REQUIRED_CSV_COLS.filter(c => !header.includes(c));
  if (missing.length > 0) throw new Error('필수 컬럼 누락: ' + missing.join(', '));
  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const cells = lines[i].split(',').map(c => c.trim());
    const obj = {};
    header.forEach((h, idx) => { obj[h] = cells[idx] !== undefined ? cells[idx] : ''; });
    if (!obj.MaterialCode) continue;
    rows.push(obj);
  }
  if (rows.length === 0) throw new Error('유효한 자재 행이 없습니다');
  return rows;
}

const MasterTab = ({ materials, setMaterials, ckSteps, setCkSteps, openPopup, lang='ko' }) => {
  const t = T[lang];
  const [error, setError] = useState('');
  const [success, setSuccess] = useState('');

  const handleFile = (e) => {
    setError(''); setSuccess('');
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const rows = parseCSV(String(ev.target.result));
        setMaterials(rows);
        setSuccess(`업로드 성공: ${rows.length}개 자재 반영됨`);
      } catch (err) {
        setError(err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const resetDefault = () => {
    setMaterials(DEFAULT_MATERIALS);
    setError(''); setSuccess('기본 마스터데이터로 복원되었습니다');
  };

  // unique material list (by code, prefer lowest BOMLevel definition)
  const uniqueMats = useMemo(() => {
    const map = {};
    materials.forEach(m => { if (!map[m.MaterialCode]) map[m.MaterialCode] = m; });
    return Object.values(map);
  }, [materials]);

  // cost rollup (bottom-up) using standard prices and BOM quantities
  const rollup = useMemo(() => {
    const std = (code) => {
      const m = uniqueMats.find(x => x.MaterialCode === code);
      return m ? parseFloat(m.StandardPrice) : 0;
    };
    const compFor = (parent) => materials.filter(m => m.ParentMaterial === parent);
    return uniqueMats.filter(m => m.MaterialType !== 'ROH').map(m => {
      const comps = compFor(m.MaterialCode);
      const rolled = comps.reduce((s,c)=> s + std(c.MaterialCode)*parseFloat(c.Quantity||'0'), 0);
      return { code:m.MaterialCode, type:m.MaterialType, std:parseFloat(m.StandardPrice), rolled, comps };
    });
  }, [uniqueMats, materials]);

  const typeColor = { FERT:'bg-blue-100 text-blue-800', HALB:'bg-orange-100 text-orange-800', ROH:'bg-green-100 text-green-800' };

  return (
    <div>

            </button>
          </div>
          {error && <div className="mt-2 p-2 bg-red-50 text-red-700 text-xs rounded border border-red-200">⛔ {error}</div>}
          {success && <div className="mt-2 p-2 bg-green-50 text-green-700 text-xs rounded border border-green-200">✓ {success}</div>}
        </Card>

        <Card title={lang==='ko'?'📋 자재 목록':'📋 Material List'}>
          <table className="w-full text-xs">
            <thead>
              <tr className="text-slate-500 border-b border-slate-200">
                <th className="text-left py-1">{t.colCode}</th>
                <th className="text-left py-1">{t.colDesc}</th>
                <th className="text-center py-1">{t.colType}</th>
                <th className="text-right py-1">{t.colStd}</th>
                <th className="text-center py-1">{t.colUnit}</th>
              </tr>
            </thead>
            <tbody>
              {uniqueMats.map((m,i)=>(
                <tr key={i} className="border-b border-slate-50">
                  <td className="py-1 font-mono font-medium">{m.MaterialCode}</td>
                  <td className="py-1 text-slate-600">{m.Description}</td>
                  <td className="py-1 text-center">
                    <span className={`px-1.5 py-0.5 rounded text-[10px] ${typeColor[m.MaterialType]||'bg-gray-100'}`}>{m.MaterialType}</span>
                  </td>
                  <td className="py-1 text-right">${parseFloat(m.StandardPrice).toFixed(2)}</td>
                  <td className="py-1 text-center text-slate-500">{m.UOM}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </Card>

        <Card title={t.stdCostTitle}>
          <p className="text-xs text-slate-500 mb-3">

          </p>
          <StepButton steps={ckSteps} setSteps={setCkSteps} stepKey="kp26" label={t.btnKP26} color="purple" lang={lang} openPopup={openPopup}
            journalData={JOURNAL_DATA.kp26[lang]} />

          <StepButton steps={ckSteps} setSteps={setCkSteps} stepKey="ck24_h" label={t.btnCK24_H} color="purple" disabled={!ckSteps.ck11n_h} lang={lang} openPopup={openPopup}

    co01_h:false, gi_h:false, co11n_h:false, gr_h:false,

  });

  const [sdSteps, setSdSteps] = useState({ va01:false, vl01n:false, vf01:false, f28:false });
  const [ckSteps, setCkSteps] = useState({ kp26:false, ck11n_h:false, ck24_h:false, ck11n_f:false, ck24_f:false });

  const [mmReturnSteps, setMmReturnSteps] = useState({ ret_po:false, ret_migo:false });
  const [miSteps, setMiSteps] = useState({ mi01:false, mi04:false, mi07:false });

  /* ---- MM derived data ---- */
  const mmInv = useMemo(() => {
    const roh001Qty = mmSteps.migo_gr ? 100 : 0;
    const roh001Amt = mmSteps.migo_gr ? 550 : 0;
    return [{ code:'ROH001', uom:'KG', qty:roh001Qty, amt:roh001Amt }];
  }, [mmSteps]);
  const priceVar = mmSteps.migo_gr ? 50 : 0;
  const apBalance = useMemo(() => {
    let bal = 0;
    if (mmSteps.miro) bal += 500;
    if (mmSteps.f53) bal -= 500;
    return bal;
  }, [mmSteps]);

  /* ---- PP derived data (linked to MM stock) ---- */
  const roh001FromMM = mmSteps.migo_gr ? 100 : 0;
  const ppInv = useMemo(() => {
    // ROH001: from MM 100KG; consumed 60KG (HALB GI) + 5KG (FERT GI)
    let roh001 = roh001FromMM;
    if (ppSteps.gi_h) roh001 -= 60;
    if (ppSteps.gi_f) roh001 -= 5;
    const roh001Amt = roh001 * 5.50;
    // ROH002: assume 20KG available; consumed 20KG at HALB GI
    let roh002 = 20;
    if (ppSteps.gi_h) roh002 -= 20;
    const roh002Amt = roh002 * 3.20;
    // HALB001: produced 20EA (GR_H), consumed 10EA (GI_F)
    let halb = 0;
    if (ppSteps.gr_h) halb += 20;
    if (ppSteps.gi_f) halb -= 10;
    const halbAmt = halb * 18.00;
    // FERT001: produced 10EA (GR_F)
    let fert = 0;
    if (ppSteps.gr_f) fert += 10;
    const fertAmt = fert * 45.00;
    return [
      { code:'ROH001', uom:'KG', qty:roh001, amt:roh001Amt },
      { code:'ROH002', uom:'KG', qty:roh002, amt:roh002Amt },
      { code:'HALB001', uom:'EA', qty:halb, amt:halbAmt },
      { code:'FERT001', uom:'EA', qty:fert, amt:fertAmt },
    ];
  }, [ppSteps, roh001FromMM]);

  const wip = useMemo(() => {
    let halb = 0;
    if (ppSteps.gi_h) halb += 394;      // material 330+64
    if (ppSteps.co11n_h) halb += 700;   // activities 400+300 (actual)
    if (ppSteps.gr_h) halb -= 360;      // factory output credit (std)
    if (ppSteps.ko88_h) halb -= 500;    // settlement variance moved out
    let fert = 0;
    if (ppSteps.gi_f) fert += 207.50;
    if (ppSteps.co11n_f) fert += 225;
    if (ppSteps.gr_f) fert -= 450;
    if (ppSteps.ko88_f) fert += 30;
    return { halb, fert };
  }, [ppSteps]);

  const ppVar = useMemo(() => ({
    halb: ppSteps.ko88_h ? 500 : 0,
    fert: ppSteps.ko88_f ? -30 : 0,
  }), [ppSteps]);

  /* ---- FI/CO derived ---- */
  const ficoDone = ficoSteps.pc;
  const copa = { actualCOGS: ficoDone ? 326.875 : 225 };

  /* ---- SD derived data (linked to PP finished goods) ---- */
  const fertFromPP = ppSteps.gr_f ? 10 : 0;
  const sdInv = useMemo(() => {
    let fert = fertFromPP;
    if (sdSteps.vl01n) fert -= 5;
    return [{ code:'FERT001', uom:'EA', qty:fert, amt:fert*45.00 }];
  }, [sdSteps, fertFromPP]);
  const arBalance = useMemo(() => {
    let bal = 0;
    if (sdSteps.vf01) bal += 750;
    if (sdSteps.f28) bal -= 750;
    return bal;
  }, [sdSteps]);
  const revenue = sdSteps.vf01 ? 750 : 0;

  const tabLabels = T[lang].tabs;
  const tabs = [
    { id:'master', label:tabLabels[0], icon:'📋' },
    { id:'mm', label:tabLabels[1], icon:'🛒' },
    { id:'pp', label:tabLabels[2], icon:'🏭' },
    { id:'fico', label:tabLabels[3], icon:'🧮' },
    { id:'sd', label:tabLabels[4], icon:'💵' },
    { id:'ledger', label:tabLabels[5], icon:'📒' },
    { id:'dryrun', label:'Dryrun', icon:'📊' },
    { id:'copa', label:lang==='ko'?'CO-PA 수익성':'CO-PA', icon:'📈' },
  ];

  const TAB_GROUPS = [
    { id:'grp_ledger',   label:'Ledger',   icon:'📋', tabIds:['master'] },
    { id:'grp_business', label:'Business', icon:'🏢', tabIds:['mm','pp','sd'] },
    { id:'grp_finance',  label:'Finance',  icon:'💹', tabIds:['fico','copa'] },
    { id:'grp_tour',     label:'Tour',     icon:'🗺️', tabIds:['dryrun','ledger'] },
  ];
  const activeGroup = TAB_GROUPS.find(g => g.tabIds.includes(activeTab)) || TAB_GROUPS[0];
  const activeGroupTabs = activeGroup.tabIds.map(id => tabs.find(t => t.id === id)).filter(Boolean);

  return (
    <div className="min-h-screen">
      {showPopup && <JournalPopup data={popupData} onClose={() => setShowPopup(false)} />}

      <header className="bg-gradient-to-r from-slate-800 to-slate-700 text-white shadow-md">
        <div className="max-w-7xl mx-auto px-4 py-3">
          <div className="flex items-center gap-3">
            <span className="text-2xl">🏭</span>
            <div>
              <h1 className="font-bold text-lg">SAP ECC Simulator — {COMPANY.name}</h1>
              <p className="text-xs text-slate-300">
                Company Code {COMPANY.code} · Plant {COMPANY.plant} ({COMPANY.plantName})
              </p>
            </div>
            <button
              onClick={() => setLang(l => l === 'ko' ? 'en' : 'ko')}
              className="ml-auto flex items-center gap-1 px-3 py-1 rounded-full border border-slate-500 text-xs font-semibold text-slate-200 hover:bg-slate-700 transition-colors"
            >
              {lang === 'ko' ? '🇺🇸 EN' : '🇰🇷 KO'}
            </button>
          </div>
          {/* Group Nav (Top Level) */}
          <nav className="flex gap-1 mt-3">
            {TAB_GROUPS.map(g => (
              <button key={g.id}
                onClick={() => setActiveTab(g.tabIds[0])}
                className={`px-5 py-1.5 font-bold rounded-t transition-all tracking-wide
                  ${g.id==='grp_ledger' ? 'text-[0.825rem]' : 'text-xs'}
                  ${activeGroup.id===g.id
                    ? 'bg-indigo-500 text-white shadow-sm'
                    : 'bg-white/10 text-slate-300 hover:bg-white/20 hover:text-white'}`}>
                {g.icon} {g.label}
              </button>
            ))}
          </nav>
          {/* Sub-Tab Nav */}
          <nav className="flex gap-1 flex-wrap border-t border-white/10 pt-0.5">
            {activeGroupTabs.map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)}
                className={`px-4 py-2 rounded-t-lg text-sm font-medium transition-all
                  ${activeTab===t.id ? 'bg-slate-100 text-slate-800' : 'bg-white/10 text-white hover:bg-white/20'}`}>
                {t.icon} {t.label}
              </button>
            ))}
          </nav>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-5">
        {activeTab==='master' && <MasterTab materials={materials} setMaterials={setMaterials} ckSteps={ckSteps} setCkSteps={setCkSteps} openPopup={openPopup} lang={lang} />}
        {activeTab==='mm' && <MMTab mmSteps={mmSteps} setMmSteps={setMmSteps} openPopup={openPopup} mmInv={mmInv} apBalance={apBalance} priceVar={priceVar} lang={lang} mmReturnSteps={mmReturnSteps} setMmReturnSteps={setMmReturnSteps} miSteps={miSteps} setMiSteps={setMiSteps} sdebSteps={sdebSteps} setSdebSteps={setSdebSteps} />}
        {activeTab==='pp' && <PPTab ppSteps={ppSteps} setPpSteps={setPpSteps} openPopup={openPopup} ppInv={ppInv} wip={wip} ppVar={ppVar} lang={lang} />}
        {activeTab==='fico' && <FICOTab ficoSteps={ficoSteps} setFicoSteps={setFicoSteps} openPopup={openPopup} copa={copa} lang={lang} mr21Steps={mr21Steps} setMr21Steps={setMr21Steps} />}
        {activeTab==='sd' && <SDTab sdSteps={sdSteps} setSdSteps={setSdSteps} openPopup={openPopup} sdInv={sdInv} arBalance={arBalance} revenue={revenue} ficoDone={ficoDone} lang={lang} sdReturnSteps={sdReturnSteps} setSdReturnSteps={setSdReturnSteps} />}
        {activeTab==='ledger' && <LedgerTab mmSteps={mmSteps} ppSteps={ppSteps} ficoSteps={ficoSteps} sdSteps={sdSteps} ckSteps={ckSteps} materials={materials} lang={lang} />}
        {activeTab==='dryrun' && <DryrunTab lang={lang} />}
        {activeTab==='copa' && <COPATab ficoSteps={ficoSteps} sdSteps={sdSteps} ppSteps={ppSteps} lang={lang} />}
      </main>

      <footer className="max-w-7xl mx-auto px-4 py-4 text-center text-xs text-slate-400">
        SAP ECC FI/CO Simulator · Vendor {VENDOR.code} ({VENDOR.name}) · Customer {CUSTOMER.code} ({CUSTOMER.name})
        <br/>{T[lang].footerFlow}
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
